// ── Storage helpers ───────────────────────────────────────────────────────────
const API_KEY_STORAGE   = "dinnerly-api-key";
const STORAGE_KEY       = "dinnerly-recipes-v2";
const SCHEDULE_KEY      = "dinnerly-schedule-v1";
const SHOP_CHECKED_KEY  = "dinnerly-shop-checked-v1";

function getApiKey() { return localStorage.getItem(API_KEY_STORAGE) || ""; }
function setApiKey(k) { localStorage.setItem(API_KEY_STORAGE, k); }
function loadRecipes() { try { const r=localStorage.getItem(STORAGE_KEY); return r?JSON.parse(r):[]; } catch { return []; } }

function loadSchedule() { try { const s=localStorage.getItem(SCHEDULE_KEY); return s?JSON.parse(s):{}; } catch { return {}; } }

// ── API ───────────────────────────────────────────────────────────────────────
async function callClaude(messages, system="", maxTokens=1200) {
  const key=getApiKey(); if (!key) throw new Error("NO_API_KEY");
  const body={model:"claude-sonnet-4-6",max_tokens:maxTokens,messages};
  if (system) body.system=system;
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify(body),
  });
  if (!res.ok) { const e=await res.json(); throw new Error(e.error?.message||"API error"); }
  const data=await res.json();
  return data.content?.find(b=>b.type==="text")?.text||"";
}

function compressImage(dataUrl, maxWidth=800, quality=0.72) {
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const ratio=Math.min(1,maxWidth/img.width);
      const w=Math.round(img.width*ratio), h=Math.round(img.height*ratio);
      const canvas=document.createElement("canvas"); canvas.width=w; canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      res(canvas.toDataURL("image/jpeg",quality));
    };
    img.src=dataUrl;
  });
}

function imgBlock(base64,mediaType) { return {type:"image",source:{type:"base64",media_type:mediaType,data:base64}}; }

async function parseRecipeCards(frontB64,frontType,backB64,backType) {
  const text=await callClaude([{role:"user",content:[
    imgBlock(frontB64,frontType),
    {type:"text",text:"This is the FRONT of a Dinnerly recipe card (title, photo, time, servings)."},
    imgBlock(backB64,backType),
    {type:"text",text:`This is the BACK of the same Dinnerly recipe card.
Dinnerly cards have these distinct sections — extract each separately:
1. "What We Send" — main ingredients with measurements
2. "What You Need" — pantry staples, rarely have measurements (e.g. "kosher salt", "olive oil")
3. "Tools" — kitchen utensils needed (e.g. "medium saucepan", "large skillet")
4. Steps / instructions

Return ONLY valid JSON, no markdown, no backticks:
{
  "title": "...",
  "servings": 4,
  "totalTime": "20 min",
  "ingredientsSent": [
    { "name": "elbow macaroni", "qty": 0.5, "unit": "lb", "display": "½ lb elbow macaroni" }
  ],
  "ingredientsNeeded": ["kosher salt & ground pepper", "olive oil"],
  "tools": ["medium saucepan", "large skillet"],
  "steps": [
    { "title": "Cook pasta", "body": "Full instruction text." }
  ],
  "nutrition": { "calories": 780, "protein": "46g", "carbs": "71g", "fat": "30g" }
}
Rules:
- servings must be a NUMBER (integer)
- ingredientsSent: each needs qty (number) + unit (string) + display (original text) + name
- ingredientsNeeded: simple string array, no measurements
- tools: simple string array
- Each step needs a SHORT title (2-4 words) and body (full instruction)
- Split compound paragraphs into individual steps`}
  ]}],"",2000);
  const clean=text.replace(/```json|```/g,"").trim();
  const parsed=JSON.parse(clean);
  // Normalize: always ensure legacy "ingredients" field for backward compat
  if (!parsed.ingredients) parsed.ingredients=parsed.ingredientsSent||[];
  return parsed;
}

function formatQty(qty,unit,name) {
  const fractions=[[0.125,"⅛"],[0.25,"¼"],[0.333,"⅓"],[0.5,"½"],[0.667,"⅔"],[0.75,"¾"]];
  const whole=Math.floor(qty), frac=qty-whole;
  let q=whole>0?String(whole):"";
  const match=fractions.find(([v])=>Math.abs(frac-v)<0.05);
  if (match) q+=match[1]; else if (frac>0.05) q+=` ${frac.toFixed(1).replace(/\.?0+$/,"")}`;
  return `${q.trim()} ${unit} ${name}`.trim();
}

function scaleIngredients(recipe,n) {
  const src=recipe.ingredientsSent||recipe.ingredients||[];
  const ratio=n/recipe.servings;
  return src.map(ing=>({...ing,qty:ing.qty*ratio,display:formatQty(ing.qty*ratio,ing.unit,ing.name)}));
}

async function askScalerQuestion(recipe,n,question,history) {
  const scaled=scaleIngredients(recipe,n);
  const system=`Cooking assistant for "${recipe.title}". Original: ${recipe.servings} servings. Scaled to: ${n} servings.
INGREDIENTS: ${scaled.map(i=>`- ${i.display}`).join("\n")}
STEPS: ${recipe.steps.map((s,i)=>`${i+1}. ${typeof s==="object"?s.title+": "+s.body:s}`).join("\n")}
Answer concisely. Use scaled quantities.`;
  return callClaude([...history.map(h=>({role:h.role,content:h.content})),{role:"user",content:question}],system,600);
}

// ── Shopping list aggregation ─────────────────────────────────────────────────
function buildShoppingList(schedule, recipes) {
  const recipeMap={};
  recipes.forEach(r=>recipeMap[r.id]=r);

  const sentMap={}; // key: "name|unit" -> { display, qty, unit, name, recipes[] }
  const neededSet=new Set();
  const toolsSet=new Set();

  const DAYS=["mon","tue","wed","thu","fri","sat","sun"];
  DAYS.forEach(day=>{
    const rid=schedule[day];
    if (!rid) return;
    const r=recipeMap[rid];
    if (!r) return;

    // ingredientsSent — aggregate by name+unit
    const src=r.ingredientsSent||r.ingredients||[];
    src.forEach(ing=>{
      const key=`${ing.name.toLowerCase().trim()}|${(ing.unit||"").toLowerCase().trim()}`;
      if (sentMap[key]) {
        sentMap[key].qty+=ing.qty||0;
        sentMap[key].recipes.push(r.title);
      } else {
        sentMap[key]={name:ing.name,unit:ing.unit||"",qty:ing.qty||0,recipes:[r.title]};
      }
    });

    // ingredientsNeeded — deduplicate
    (r.ingredientsNeeded||[]).forEach(n=>neededSet.add(n.trim()));

    // tools — deduplicate
    (r.tools||[]).forEach(t=>toolsSet.add(t.trim()));
  });

  // Rebuild display strings for aggregated sent ingredients
  const sent=Object.values(sentMap).map(item=>({
    ...item,
    display:formatQty(item.qty,item.unit,item.name),
  }));

  return {
    sent,
    needed:Array.from(neededSet).sort(),
    tools:Array.from(toolsSet).sort(),
  };
}

function detectCategory(title,saved) {
  if (saved&&saved!=="other") return saved;
  const t=(title||"").toLowerCase();
  for (const cat of CATEGORIES) {
    if (cat.id==="other") continue;
    if (cat.keywords.some(k=>t.includes(k))) return cat.id;
  }
  return "other";
}
function getCategoryInfo(id) { return CATEGORIES.find(c=>c.id===id)||CATEGORIES[CATEGORIES.length-1]; }

// ── Voice helpers ─────────────────────────────────────────────────────────────
function speak(text) { window.speechSynthesis?.cancel(); const u=new SpeechSynthesisUtterance(text); u.rate=0.95; u.pitch=1; u.volume=1; window.speechSynthesis?.speak(u); }
function stopSpeaking() { window.speechSynthesis?.cancel(); }

const NEXT_PHRASES       =["next step","ok what's next","what's next","continue","okay what's next","move on"];
const START_PHRASES      =["i've got all the ingredients","i have all the ingredients","ready to start cooking","ready to cook","let's start cooking","let's cook","start cooking","all ingredients ready","ingredients are ready"];
const WHATS_LEFT_PHRASES =["what's left","whats left","what do i still need","what's remaining","whats remaining","read the list","what else","read it to me","what do i need","what is left"];
const GOT_THAT_PHRASES   =["got that","got it","got that one","have that","i have that","check that","yep got it","check it","next one","got one","i got it","i got that"];

function useVoice(onNext,active) {
  const ref=useRef(active); ref.current=active;
  useEffect(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if (!SR||!active) return;
    const rec=new SR(); rec.continuous=true; rec.interimResults=false; rec.lang="en-US";
    rec.onresult=e=>{const t=e.results[e.results.length-1][0].transcript.toLowerCase().trim(); if(NEXT_PHRASES.some(p=>t.includes(p)))onNext();};
    rec.onend=()=>{if(ref.current)try{rec.start();}catch{}};
    try{rec.start();}catch{}
    return()=>{try{rec.stop();}catch{}};
  },[active]);
}

function useChecklistVoice({active,ingredients,checked,onCheck,onGotAll,onHeard}) {
  const sr=useRef({ingredients,checked}); sr.current={ingredients,checked};
  useEffect(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if (!SR||!active) return;
    const rec=new SR(); rec.continuous=true; rec.interimResults=false; rec.lang="en-US";
    rec.onresult=e=>{
      const t=e.results[e.results.length-1][0].transcript.toLowerCase().trim();
      if (onHeard) onHeard(t);
      const {ingredients,checked}=sr.current;
      if (START_PHRASES.some(p=>t.includes(p))){stopSpeaking();onGotAll();return;}
      if (WHATS_LEFT_PHRASES.some(p=>t.includes(p))){
        const unc=ingredients.filter((_,i)=>!checked[i]);
        unc.length===0?speak("You've got everything! Say ready to cook."):speak("You still need: "+unc.map(i=>i.display||i.name).join(", ")+". Say got that one after each.");
        return;
      }
      if (GOT_THAT_PHRASES.some(p=>t.includes(p))){
        const ni=ingredients.findIndex((_,i)=>!checked[i]);
        if(ni!==-1){onCheck(ni,true);const rem=ingredients.filter((_,i)=>i!==ni&&!checked[i]);rem.length===0?speak("That's everything! Say ready to cook."):speak("Got it. "+rem.length+" left. Next: "+(rem[0].display||rem[0].name)+".");}
        return;
      }
      const mi=ingredients.findIndex((ing,i)=>!checked[i]&&(ing.name||"").toLowerCase().split(/\s+/).some(w=>w.length>3&&t.includes(w)));
      if(mi!==-1){onCheck(mi,true);const rem=ingredients.filter((_,i)=>i!==mi&&!checked[i]);speak(rem.length===0?"That's the last one!":"Got it. "+rem.length+" left.");}
    };
    rec.onend=()=>{if(active)try{rec.start();}catch{}};
    try{rec.start();}catch{}
    return()=>{try{rec.stop();}catch{}};
  },[active]);
}

function useWakeLock(active) {
  const ref=useRef(null);
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  const ok="wakeLock" in navigator&&!isIOS;
  useEffect(()=>{
    if (!active||!ok) return; let gone=false;
    navigator.wakeLock.request("screen").then(l=>{if(!gone)ref.current=l;}).catch(()=>{});
    const onVis=()=>{if(document.visibilityState==="visible"&&!ref.current)navigator.wakeLock.request("screen").then(l=>ref.current=l).catch(()=>{});};
    document.addEventListener("visibilitychange",onVis);
    return()=>{gone=true;document.removeEventListener("visibilitychange",onVis);ref.current?.release().catch(()=>{});ref.current=null;};
  },[active,ok]);
  return {ok,isIOS};
}

    if(!k.startsWith("sk-ant-")){setErr("Key should start with sk-ant- (got: "+k.substring(0,12)+")");return;}
    setTesting(true);setErr("");
    try{setApiKey(k);await callClaude([{role:"user",content:"Hi"}],"",10);onSaved();}
    catch(e){setApiKey("");setErr("Couldn't connect: "+e.message);}
    setTesting(false);
  };
  return (
    <div style={{...base,minHeight:"100vh",background:C.paper,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{background:C.card,borderRadius:16,padding:32,maxWidth:480,width:"100%",boxShadow:"0 4px 32px rgba(0,0,0,0.08)"}}>

        <div style={{fontSize:14,color:C.muted,marginBottom:4}}>Recipe Catalog — first-time setup</div>
        <div style={{fontSize:11,color:C.muted,marginBottom:24,letterSpacing:1}}>v2.0</div>
        <div style={{fontSize:15,fontWeight:700,marginBottom:8}}>Enter your Anthropic API key</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:16,lineHeight:1.5}}>Get one free at <strong>console.anthropic.com</strong> → API Keys. Stored only on this device.</div>
        <div style={{position:"relative",marginBottom:8}}>
          <input type={show?"text":"password"} value={key} onChange={e=>setKey(e.target.value)} onKeyDown={e=>e.key==="Enter"&&save()}
            placeholder="sk-ant-api03-..." style={{...inp,fontSize:13,paddingRight:48}} autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false"/>
          <button onClick={()=>setShow(v=>!v)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:18,color:C.muted}}>{show?"🙈":"👁"}</button>
        </div>
        <div style={{fontSize:12,color:C.muted,marginBottom:16}}>
          Key preview: <strong style={{color:C.ink,fontFamily:"monospace"}}>{key?key.substring(0,16)+"...":"(nothing pasted yet)"}</strong>
          {key&&<span style={{marginLeft:8,color:key.startsWith("sk-ant-")?C.sage:"#b03020",fontWeight:700}}>{key.startsWith("sk-ant-")?"✓ looks good":"✗ wrong format"}</span>}
        </div>
        {err&&<div style={{color:"#b03020",fontSize:13,marginBottom:12,padding:"10px 12px",background:"#fff0ee",borderRadius:6}}>{err}</div>}
        <button onClick={save} disabled={testing||!key.trim()} style={{...btnP,width:"100%",padding:14,fontSize:16,opacity:(testing||!key.trim())?0.5:1}}>{testing?"Testing…":"Save & Continue →"}</button>
      </div>
    </div>
  );
}

// ── Category Screen ───────────────────────────────────────────────────────────
function CategoryScreen({recipes,onSelectCategory,onBack,onAdd}) {
  const counts={};
  recipes.forEach(r=>{const c=detectCategory(r.title,r.category);counts[c]=(counts[c]||0)+1;});

// ── Upload Zone ───────────────────────────────────────────────────────────────
function UploadZone({id,label,data,onFileChosen}) {
  return (
    <label htmlFor={id} style={{flex:1,borderRadius:12,padding:"24px 16px",textAlign:"center",cursor:"pointer",minHeight:180,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10,border:`2px dashed ${data?C.sageMid:C.border}`,background:data?C.sageLight:"#fafafa"}}>
      {data?<img src={data.dataUrl} alt={label} style={{maxHeight:140,borderRadius:8,boxShadow:"0 2px 8px rgba(0,0,0,0.12)"}}/>:<>
        <div style={{fontSize:36}}>📷</div>
        <div style={{fontWeight:700,fontSize:15,color:C.ink}}>{label}</div>
        <div style={{fontSize:12,color:C.muted}}>Tap to choose or take photo</div>
      </>}
      <input id={id} type="file" accept="image/*" capture="environment"
        style={{position:"absolute",width:1,height:1,opacity:0,pointerEvents:"none"}}
        onChange={e=>{if(e.target.files?.[0])onFileChosen(e.target.files[0]);}}/>
    </label>
  );
}

// ── Scan Screen ───────────────────────────────────────────────────────────────
function ScanScreen({onBack,onSaved}) {
  const [front,setFront]=useState(null); const [back,setBack]=useState(null);
  const [stage,setStage]=useState("upload"); const [recipe,setRecipe]=useState(null); const [error,setError]=useState(null);
  const readFile=file=>new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{const d=e.target.result;res({dataUrl:d,base64:d.split(",")[1],type:file.type||"image/jpeg"});};r.onerror=rej;r.readAsDataURL(file);});
  const handleParse=async()=>{
    if(!front||!back) return; setError(null); setStage("parsing");
    try {
      const parsed=await parseRecipeCards(front.base64,front.type,back.base64,back.type);
      const compressed=await compressImage(front.dataUrl);
      setRecipe({...parsed,id:Date.now(),addedAt:new Date().toISOString(),frontImage:compressed});
      setStage("review");
    } catch(e){setError("Couldn't read the cards: "+e.message+". Make sure both images are clear.");setStage("upload");}
  };
  return (
    <div style={{...base,minHeight:"100vh",background:C.paper}}>
      <TopBar onBack={onBack} title="Scan Recipe Card"/>
      <div style={{maxWidth:680,margin:"32px auto",padding:"0 24px"}}>
        {stage==="upload"&&<>
          <p style={{color:C.muted,fontSize:14,marginBottom:24,textAlign:"center"}}>Upload both sides — front for photo &amp; title, back for ingredients and steps.</p>
          <div style={{display:"flex",gap:16,marginBottom:24}}>
            <UploadZone id="upload-front" label="Front of card" data={front} onFileChosen={async f=>setFront(await readFile(f))}/>
            <UploadZone id="upload-back" label="Back of card" data={back} onFileChosen={async f=>setBack(await readFile(f))}/>
          </div>
          {error&&<div style={{background:"#fff0ee",border:"1px solid #f5c0b0",borderRadius:8,padding:"12px 16px",color:"#b03020",fontSize:14,marginBottom:16}}>{error}</div>}
          <button onClick={handleParse} disabled={!front||!back}
            style={{...btnP,width:"100%",padding:14,fontSize:16,opacity:(!front||!back)?0.4:1,cursor:(!front||!back)?"default":"pointer"}}>Read Recipe Cards →</button>
        </>}
        {stage==="parsing"&&(
          <div style={{textAlign:"center",padding:"60px 0"}}>
            <div style={{display:"flex",gap:16,justifyContent:"center",marginBottom:32}}>
              {front&&<img src={front.dataUrl} alt="front" style={{height:140,borderRadius:10,boxShadow:"0 2px 12px rgba(0,0,0,0.1)"}}/>}
              {back&&<img src={back.dataUrl} alt="back" style={{height:140,borderRadius:10,boxShadow:"0 2px 12px rgba(0,0,0,0.1)"}}/>}
            </div>
            <div style={{fontSize:20,fontWeight:700,marginBottom:10}}>Reading both sides…</div>
            <div style={{color:C.muted,fontSize:14}}>Extracting ingredients and steps.</div>
            <div style={{marginTop:20,display:"flex",gap:8,justifyContent:"center"}}>
              {[0,1,2].map(i=><div key={i} style={{width:10,height:10,borderRadius:"50%",background:C.sage,animation:`pulse 1.4s ${i*0.2}s infinite`}}/>)}
            </div>
          </div>
        )}
        {stage==="review"&&recipe&&<ReviewForm recipe={recipe} onSave={r=>onSaved(r)} onBack={()=>setStage("upload")}/>}
      </div>
    </div>
  );
}

function ReviewForm({recipe:initial,onSave,onBack}) {
  const [r,setR]=useState(initial);
  const upd=p=>setR(prev=>({...prev,...p}));
  const src=r.ingredientsSent||r.ingredients||[];
  const updIng=(i,f,v)=>{const a=[...src];a[i]={...a[i],[f]:v};upd({ingredientsSent:a,ingredients:a});};
  const updStep=(i,v)=>{const a=[...r.steps];a[i]=v;upd({steps:a});};
  return (
    <div>
      <div style={{background:"#fff8f0",border:"1px solid #f0dcc8",borderRadius:10,padding:"12px 16px",fontSize:13,color:"#7a4020",marginBottom:24}}>✏️ Review and edit before saving.</div>
      <input value={r.title} onChange={e=>upd({title:e.target.value})} style={{...inp,fontSize:20,fontWeight:700,marginBottom:12}}/>
      <div style={{display:"flex",gap:12,marginBottom:24}}>
        <div style={{flex:1}}><div style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:C.muted,marginBottom:5}}>Servings</div><input type="number" value={r.servings} onChange={e=>upd({servings:parseInt(e.target.value)||0})} style={inp}/></div>
        <div style={{flex:1}}><div style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:C.muted,marginBottom:5}}>Total Time</div><input value={r.totalTime||""} onChange={e=>upd({totalTime:e.target.value})} style={inp}/></div>
      </div>
      <div style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:C.muted,marginBottom:12,paddingBottom:6,borderBottom:`1px solid ${C.border}`}}>What We Send ({src.length})</div>
      <div style={{marginBottom:16}}>
        {src.map((ing,i)=>(
          <div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
            <span style={{color:C.sage,fontSize:14}}>●</span>
            <input value={ing.qty} type="number" step="0.01" onChange={e=>updIng(i,"qty",parseFloat(e.target.value)||0)} style={{...inp,width:60}}/>
            <input value={ing.unit} onChange={e=>updIng(i,"unit",e.target.value)} placeholder="unit" style={{...inp,width:70}}/>
            <input value={ing.name} onChange={e=>updIng(i,"name",e.target.value)} placeholder="ingredient" style={{...inp,flex:1}}/>
          </div>
        ))}
      </div>
      {r.ingredientsNeeded&&r.ingredientsNeeded.length>0&&<>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:C.muted,marginBottom:8,paddingBottom:6,borderBottom:`1px solid ${C.border}`}}>What You Need</div>
        <div style={{marginBottom:16,display:"flex",flexWrap:"wrap",gap:8}}>
          {r.ingredientsNeeded.map((n,i)=><span key={i} style={{background:C.sageLight,color:C.sageDark,borderRadius:20,padding:"4px 12px",fontSize:13}}>{n}</span>)}
        </div>
      </>}
      {r.tools&&r.tools.length>0&&<>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:C.muted,marginBottom:8,paddingBottom:6,borderBottom:`1px solid ${C.border}`}}>Tools</div>
        <div style={{marginBottom:16,display:"flex",flexWrap:"wrap",gap:8}}>
          {r.tools.map((t,i)=><span key={i} style={{background:"#F0EDE8",color:C.muted,borderRadius:20,padding:"4px 12px",fontSize:13}}>🍳 {t}</span>)}
        </div>
      </>}
      <div style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:C.muted,marginBottom:12,paddingBottom:6,borderBottom:`1px solid ${C.border}`}}>Steps ({r.steps.length})</div>
      {r.steps.map((step,i)=>{
        const title=typeof step==="object"?step.title:""; const body=typeof step==="object"?step.body:step;
        return (
          <div key={i} style={{display:"flex",gap:10,marginBottom:14,alignItems:"flex-start"}}>
            <div style={{minWidth:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#6B4FC8,#8B6DE0)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0,marginTop:4}}>{i+1}</div>
            <div style={{flex:1,display:"flex",flexDirection:"column",gap:6}}>
              <input value={title} placeholder="Step title" onChange={e=>updStep(i,{title:e.target.value,body})} style={{...inp,fontWeight:700,fontSize:13}}/>
              <textarea value={body} rows={2} placeholder="Instructions…" onChange={e=>updStep(i,{title,body:e.target.value})} style={{...inp,resize:"vertical",lineHeight:1.5}}/>
            </div>
          </div>
        );
      })}
      <div style={{display:"flex",gap:12,marginTop:28}}>
        <button onClick={()=>onSave(r)} style={{...btnP,flex:1,padding:13,fontSize:16}}>Save to Catalog</button>
        <button onClick={onBack} style={{...btnG,padding:"13px 20px"}}>← Rescan</button>
      </div>
    </div>
  );
}

// ── Ingredient Checklist ──────────────────────────────────────────────────────
function IngredientChecklist({ingredients,onDone}) {
  const [checked,setChecked]=useState(()=>ingredients.map(()=>false));
  const [listening,setListening]=useState(false);
  const [lastHeard,setLastHeard]=useState("");
  const cnt=checked.filter(Boolean).length; const allDone=cnt===ingredients.length;
  const doCheck=useCallback((i,v)=>setChecked(p=>{const n=[...p];n[i]=v;return n;}),[]);
  const doAll=useCallback(()=>{stopSpeaking();onDone();},[onDone]);
  useChecklistVoice({active:listening,ingredients,checked,onCheck:doCheck,onGotAll:doAll,onHeard:setLastHeard});
  return (
    <div style={{position:"fixed",inset:0,zIndex:200,background:"rgba(10,10,10,0.75)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"fadeIn 0.2s ease"}}>
      <div style={{background:"#fff",borderRadius:20,width:"100%",maxWidth:520,maxHeight:"92vh",display:"flex",flexDirection:"column",boxShadow:"0 24px 80px rgba(0,0,0,0.35)",overflow:"hidden"}}>
        <div style={{background:C.sage,padding:"22px 24px 18px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div style={{color:"#fff",fontWeight:700,fontSize:20}}>Gather Ingredients</div>
            <div style={{background:"rgba(255,255,255,0.2)",color:"#fff",borderRadius:20,padding:"4px 12px",fontSize:13,fontWeight:700}}>{cnt}/{ingredients.length}</div>
          </div>
          <div style={{height:6,background:"rgba(255,255,255,0.25)",borderRadius:3}}>
            <div style={{height:"100%",width:`${(cnt/ingredients.length)*100}%`,background:"#fff",borderRadius:3,transition:"width 0.3s ease"}}/>
          </div>
        </div>
        <div style={{overflowY:"auto",flex:1,padding:"8px 0"}}>
          {ingredients.map((ing,i)=>(
            <div key={i} className="checklist-item" onClick={()=>doCheck(i,!checked[i])} style={{display:"flex",alignItems:"center",gap:16,padding:"15px 24px",cursor:"pointer",borderBottom:i<ingredients.length-1?`1px solid ${C.border}`:"none",background:checked[i]?"#F0F8F2":"#fff",transition:"background 0.15s"}}>
              <div style={{width:34,height:34,borderRadius:9,flexShrink:0,border:checked[i]?"none":`2.5px solid ${C.border}`,background:checked[i]?C.sage:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>
                {checked[i]&&<span style={{color:"#fff",fontSize:20,lineHeight:1}}>✓</span>}
              </div>
              <span style={{fontSize:19,lineHeight:1.35,color:checked[i]?C.muted:C.ink,textDecoration:checked[i]?"line-through":"none",transition:"all 0.2s"}}>{ing.display||ing.name}</span>
            </div>
          ))}
        </div>
        <div style={{padding:"16px 24px 20px",borderTop:`1px solid ${C.border}`,background:"#FAFAFA"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
            <button onClick={()=>setListening(v=>!v)} style={{border:"none",borderRadius:10,padding:"10px 16px",fontSize:14,cursor:"pointer",fontFamily:"inherit",fontWeight:600,transition:"all 0.2s",display:"flex",alignItems:"center",gap:8,background:listening?C.sage:C.sageLight,color:listening?"#fff":C.sageDark,boxShadow:listening?`0 0 0 3px rgba(74,124,89,0.25)`:"none"}}>
              <span style={{fontSize:18}}>🎙</span>{listening?"Listening…":"Enable Voice"}
            </button>
            {listening&&<div style={{fontSize:12,color:C.muted,lineHeight:1.4}}>Say <strong style={{color:C.sageDark}}>"what's left"</strong> or <strong style={{color:C.sageDark}}>"got that one"</strong></div>}
          </div>
          {listening&&lastHeard&&<div style={{fontSize:12,color:C.muted,marginBottom:12,padding:"8px 12px",background:C.sageLight,borderRadius:6}}>🎙 Heard: <strong style={{color:C.ink}}>"{lastHeard}"</strong></div>}
          <button onClick={onDone} style={{...btnP,background:allDone?C.sage:C.orange,width:"100%",padding:15,fontSize:17,marginBottom:10}}>
            {allDone?"✓ All Set — Start Cooking!":"Start Cooking →"}
          </button>
          <div style={{fontSize:12,color:C.muted,textAlign:"center"}}>Or say <strong>"ready to start cooking"</strong></div>
        </div>
      </div>
    </div>
  );
}

// ── Recipe Picker Modal (for planner) ────────────────────────────────────────

  const filtered=recipes.filter(r=>r.title.toLowerCase().includes(search.toLowerCase()));
  return (
    <div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(10,10,10,0.6)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:600,maxHeight:"80vh",display:"flex",flexDirection:"column",boxShadow:"0 -8px 40px rgba(0,0,0,0.25)"}}>
        <div style={{background:C.plum,padding:"16px 20px",borderRadius:"20px 20px 0 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{color:"#fff",fontWeight:700,fontSize:17}}>Pick a Recipe</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"rgba(255,255,255,0.7)",fontSize:22,cursor:"pointer",lineHeight:1}}>×</button>
        </div>
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search recipes…" style={{...inp,fontSize:14}} autoFocus/>
        </div>
        <div style={{overflowY:"auto",flex:1}}>
          {current&&<div onClick={onClear} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 20px",cursor:"pointer",borderBottom:`1px solid ${C.border}`,background:"#FFF5F0"}}>
            <span style={{fontSize:22}}>✕</span>
            <span style={{fontSize:15,color:"#b03020",fontWeight:600}}>Remove this day</span>
          </div>}
          {filtered.length===0&&<div style={{padding:"40px 20px",textAlign:"center",color:C.muted,fontSize:14}}>No recipes match "{search}"</div>}
          {filtered.map(r=>{
            const cat=getCategoryInfo(detectCategory(r.title,r.category));
            const isCurrent=r.id===current;
            return (
              <div key={r.id} onClick={()=>onSelect(r.id)} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 20px",cursor:"pointer",borderBottom:`1px solid ${C.border}`,background:isCurrent?C.sageLight:"#fff",transition:"background 0.15s"}}>
                {r.frontImage
                  ?<img src={r.frontImage} alt={r.title} style={{width:52,height:40,objectFit:"cover",borderRadius:8,background:"#eee",flexShrink:0}}/>
                  :<div style={{width:52,height:40,borderRadius:8,background:C.sageLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{cat.emoji}</div>}

                  <div style={{fontSize:15,fontWeight:isCurrent?700:400,color:C.ink,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.title}</div>

                </div>
                {isCurrent&&<span style={{color:C.sage,fontWeight:700,flexShrink:0}}>✓</span>}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Weekly Planner Screen ─────────────────────────────────────────────────────
const DAYS=[
  {key:"mon",label:"Monday"},
  {key:"tue",label:"Tuesday"},
  {key:"wed",label:"Wednesday"},
  {key:"thu",label:"Thursday"},
  {key:"fri",label:"Friday"},
  {key:"sat",label:"Saturday"},
  {key:"sun",label:"Sunday"},
];

function PlannerScreen({recipes,schedule,onUpdateSchedule,onBack,onViewRecipe}) {
  const [pickingDay,setPickingDay]=useState(null);
  const [showShop,setShowShop]=useState(false);
  const recipeMap=useMemo(()=>{const m={};recipes.forEach(r=>m[r.id]=r);return m;},[recipes]);
  const assignedCount=Object.values(schedule).filter(Boolean).length;

  const handlePick=(day,recipeId)=>{
    const next={...schedule,[day]:recipeId||null};
    if(!recipeId) delete next[day];
    onUpdateSchedule(next);
    setPickingDay(null);
  };

  if (showShop) return <ShoppingListScreen recipes={recipes} schedule={schedule} onBack={()=>setShowShop(false)}/>;

  return (
    <div style={{...base,minHeight:"100vh",background:C.paper}}>
      <div style={{background:C.plum,padding:"18px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button onClick={onBack} style={{...btnD,padding:"7px 14px",fontSize:13}}>← Back</button>
        <span style={{color:"#fff",fontWeight:700,fontSize:17}}>Weekly Planner</span>
        <button onClick={()=>setShowShop(true)}
          style={{...base,background:assignedCount>0?"rgba(255,255,255,0.2)":"rgba(255,255,255,0.08)",color:"#fff",border:"1.5px solid rgba(255,255,255,0.3)",borderRadius:8,padding:"7px 14px",fontSize:13,cursor:"pointer",fontWeight:600}}>
          🛒 List
        </button>
      </div>

      {assignedCount>0&&(
        <div style={{background:"rgba(91,62,140,0.08)",borderBottom:`1px solid rgba(91,62,140,0.15)`,padding:"12px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:13,color:C.plum,fontWeight:600}}>{assignedCount} of 7 meals planned</span>
          <button onClick={()=>setShowShop(true)} style={{...base,background:C.plum,color:"#fff",border:"none",borderRadius:8,padding:"8px 18px",fontSize:13,cursor:"pointer",fontWeight:600}}>View Shopping List →</button>
        </div>
      )}

      <div style={{maxWidth:700,margin:"0 auto",padding:"20px 16px",display:"flex",flexDirection:"column",gap:12}}>
        {DAYS.map(({key,label})=>{
          const rid=schedule[key];
          const r=rid?recipeMap[rid]:null;
          const cat=r?getCategoryInfo(detectCategory(r.title,r.category)):null;
          return (
            <div key={key} className="day-card"
              style={{background:C.card,borderRadius:14,border:`1.5px solid ${r?C.sageMid:C.border}`,overflow:"hidden",boxShadow:"0 1px 6px rgba(0,0,0,0.05)",transition:"all 0.18s"}}>
              <div style={{display:"flex",alignItems:"center",gap:0}}>
                {/* Day label */}
                <div style={{width:100,padding:"16px 14px",background:r?C.sageLight:"#FAFAFA",borderRight:`1px solid ${r?C.sageMid:C.border}`,flexShrink:0}}>
                  <div style={{fontSize:13,fontWeight:700,color:r?C.sageDark:C.muted}}>{label}</div>
                </div>
                {/* Recipe or add */}
                {r?(
                  <div style={{flex:1,display:"flex",alignItems:"center",gap:12,padding:"12px 14px",cursor:"pointer"}} onClick={()=>setPickingDay(key)}>
                    {r.frontImage
                      ?<img src={r.frontImage} alt={r.title} style={{width:56,height:44,objectFit:"cover",borderRadius:8,background:"#eee",flexShrink:0}}/>
                      :<div style={{width:56,height:44,borderRadius:8,background:C.sageLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{cat.emoji}</div>}
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:14,fontWeight:700,color:C.ink,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.title}</div>
                      <div style={{fontSize:12,color:C.muted,marginTop:2}}>{cat.emoji} {cat.label}{r.totalTime?` · ⏱ ${r.totalTime}`:""}</div>
                    </div>
                    <div style={{display:"flex",gap:8,flexShrink:0}}>
                      <button onClick={e=>{e.stopPropagation();onViewRecipe(r);}} style={{...btnP,padding:"7px 12px",fontSize:12}}>Cook</button>
                      <button onClick={e=>{e.stopPropagation();setPickingDay(key);}} style={{...btnG,padding:"7px 10px",fontSize:12}}>✏️</button>
                    </div>
                  </div>
                ):(
                  <div style={{flex:1,display:"flex",alignItems:"center",gap:10,padding:"16px 14px",cursor:"pointer",color:C.muted}} onClick={()=>setPickingDay(key)}>
                    <span style={{fontSize:22,opacity:0.4}}>＋</span>
                    <span style={{fontSize:14}}>Add a meal</span>
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {pickingDay&&(
        <RecipePicker
          recipes={recipes}
          current={schedule[pickingDay]||null}
          onSelect={id=>handlePick(pickingDay,id)}
          onClear={()=>handlePick(pickingDay,null)}
          onClose={()=>setPickingDay(null)}/>
      )}
    </div>
  );
}

// ── Shopping List Screen ──────────────────────────────────────────────────────
function ShoppingListScreen({recipes,schedule,onBack}) {
  const {sent,needed,tools}=useMemo(()=>buildShoppingList(schedule,recipes),[schedule,recipes]);
  const totalItems=sent.length+needed.length;

  const [checked,setChecked]=useState(()=>loadShopChecked());
  const toggle=key=>{
    setChecked(prev=>{
      const next={...prev,[key]:!prev[key]};
      saveShopChecked(next);
      return next;
    });
  };
  const clearAll=()=>{saveShopChecked({});setChecked({});};

  const checkedCount=Object.values(checked).filter(Boolean).length;
  const assignedDays=DAYS.filter(d=>schedule[d.key]);

  if (totalItems===0) return (
    <div style={{...base,minHeight:"100vh",background:C.paper}}>
      <TopBar onBack={onBack} title="Shopping List"/>
      <div style={{textAlign:"center",padding:"80px 24px",color:C.muted}}>
        <div style={{fontSize:52,marginBottom:16}}>🛒</div>
        <div style={{fontSize:18,fontWeight:700,color:C.ink,marginBottom:8}}>No meals planned yet</div>
        <div style={{fontSize:14}}>Go back to the Weekly Planner and assign some recipes.</div>
      </div>
    </div>
  );

  return (
    <div style={{...base,minHeight:"100vh",background:C.paper}}>
      <div style={{background:C.plum,padding:"18px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button onClick={onBack} style={{...btnD,padding:"7px 14px",fontSize:13}}>← Back</button>
        <span style={{color:"#fff",fontWeight:700,fontSize:17}}>Shopping List</span>
        <button onClick={clearAll} style={{...base,background:"transparent",color:"rgba(255,255,255,0.6)",border:"none",fontSize:13,cursor:"pointer",padding:"7px 0"}}>Reset</button>
      </div>

      {/* Week summary */}
      <div style={{background:"rgba(91,62,140,0.07)",borderBottom:`1px solid rgba(91,62,140,0.12)`,padding:"10px 20px"}}>
        <div style={{fontSize:12,color:C.plum,fontWeight:600,marginBottom:6}}>This week's meals:</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {assignedDays.map(d=>{
            const r=recipes.find(r=>r.id===schedule[d.key]);
            return r?<span key={d.key} style={{fontSize:12,background:"rgba(91,62,140,0.12)",color:C.plum,borderRadius:20,padding:"3px 10px"}}><strong>{d.label.slice(0,3)}:</strong> {r.title}</span>:null;
          })}
        </div>
      </div>

      {/* Progress bar */}
      <div style={{padding:"12px 20px 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{fontSize:13,color:C.muted}}>{checkedCount} of {totalItems} items checked</span>
          {checkedCount===totalItems&&totalItems>0&&<span style={{fontSize:13,color:C.sage,fontWeight:700}}>✓ All done!</span>}
        </div>
        <div style={{height:5,background:C.border,borderRadius:3}}>
          <div style={{height:"100%",width:`${totalItems>0?(checkedCount/totalItems)*100:0}%`,background:C.sage,borderRadius:3,transition:"width 0.3s"}}/>
        </div>
      </div>

      <div style={{maxWidth:700,margin:"0 auto",padding:"16px"}}>
        {/* What We Send — main ingredients */}
        <div style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:C.muted,marginBottom:8,paddingBottom:6,borderBottom:`1px solid ${C.border}`}}>
          🛒 Ingredients to Buy ({sent.length})
        </div>
        {sent.map((item,i)=>{
          const key=`sent-${item.name}-${item.unit}`;
          const done=!!checked[key];
          return (
            <div key={i} onClick={()=>toggle(key)} style={{display:"flex",alignItems:"center",gap:14,padding:"13px 4px",borderBottom:`1px solid ${C.border}`,cursor:"pointer",transition:"background 0.1s"}}>
              <div style={{width:30,height:30,borderRadius:8,flexShrink:0,border:done?"none":`2px solid ${C.border}`,background:done?C.sage:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>
                {done&&<span style={{color:"#fff",fontSize:18,lineHeight:1}}>✓</span>}
              </div>
              <div style={{flex:1}}>
                <span style={{fontSize:16,color:done?C.muted:C.ink,textDecoration:done?"line-through":"none",transition:"all 0.2s"}}>{item.display}</span>
                {item.recipes&&item.recipes.length>1&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>Used in {item.recipes.length} recipes</div>}
              </div>
            </div>
          );
        })}

        {/* What You Need — pantry staples */}
        {needed.length>0&&<>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:C.muted,marginTop:24,marginBottom:8,paddingBottom:6,borderBottom:`1px solid ${C.border}`}}>
            🧂 Pantry Staples ({needed.length})
          </div>
          {needed.map((item,i)=>{
            const key=`needed-${item}`;
            const done=!!checked[key];
            return (
              <div key={i} onClick={()=>toggle(key)} style={{display:"flex",alignItems:"center",gap:14,padding:"13px 4px",borderBottom:`1px solid ${C.border}`,cursor:"pointer"}}>
                <div style={{width:30,height:30,borderRadius:8,flexShrink:0,border:done?"none":`2px solid ${C.border}`,background:done?C.sage:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>
                  {done&&<span style={{color:"#fff",fontSize:18,lineHeight:1}}>✓</span>}
                </div>
                <span style={{fontSize:16,color:done?C.muted:C.ink,textDecoration:done?"line-through":"none"}}>{item}</span>
              </div>
            );
          })}
        </>}

        {/* Tools */}
        {tools.length>0&&<>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:C.muted,marginTop:24,marginBottom:8,paddingBottom:6,borderBottom:`1px solid ${C.border}`}}>
            🍳 Tools You'll Need ({tools.length})
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,paddingBottom:16}}>
            {tools.map((t,i)=><span key={i} style={{background:"#F0EDE8",color:C.muted,borderRadius:20,padding:"6px 14px",fontSize:13}}>🍳 {t}</span>)}
          </div>
        </>}
      </div>
    </div>
  );
}

// ── Detail Screen ─────────────────────────────────────────────────────────────
function DetailScreen({recipe,onBack,onCook,onUpdatePhoto,onUpdateCategory}) {
  const [guestCount,setGuestCount]=useState(recipe.servings);
  const [scaledIng,setScaledIng]=useState(()=>scaleIngredients(recipe,recipe.servings));
  const [scaling,setScaling]=useState(false);
  const [chat,setChat]=useState([]);
  const [question,setQuestion]=useState("");
  const [asking,setAsking]=useState(false);
  const [showChecklist,setShowChecklist]=useState(false);
  const [showCatPicker,setShowCatPicker]=useState(false);
  const [photoHover,setPhotoHover]=useState(false);
  const photoInputRef=useRef(); const chatRef=useRef();
  const currentCat=getCategoryInfo(detectCategory(recipe.title,recipe.category));

  const handlePhotoChange=async file=>{
    if(!file) return;
    const reader=new FileReader();
    reader.onload=async e=>{const compressed=await compressImage(e.target.result);onUpdatePhoto(recipe.id,compressed);};
    reader.readAsDataURL(file);
  };
  const handleScale=count=>{setGuestCount(count);setScaling(true);setScaledIng(scaleIngredients(recipe,count));setScaling(false);};
  const handleAsk=async()=>{
    if(!question.trim()||asking) return;
    const q=question.trim(); setQuestion("");
    const h=[...chat,{role:"user",content:q}]; setChat(h); setAsking(true);
    try{const a=await askScalerQuestion(recipe,guestCount,q,chat);setChat([...h,{role:"assistant",content:a}]);}
    catch(e){setChat([...h,{role:"assistant",content:"Error: "+e.message}]);}
    setAsking(false); setTimeout(()=>chatRef.current?.scrollTo({top:9999,behavior:"smooth"}),100);
  };
  const handleDone=useCallback(()=>{setShowChecklist(false);onCook(recipe,guestCount,scaledIng);},[recipe,guestCount,scaledIng,onCook]);
  const ratio=guestCount/recipe.servings;

  return (
    <div style={{...base,minHeight:"100vh",background:C.paper}}>
      <TopBar onBack={onBack} title={recipe.title} right={<button onClick={()=>setShowChecklist(true)} style={{...btnP,background:C.orange,padding:"8px 18px",fontSize:14}}>Cook →</button>}/>
      <div style={{background:C.sageLight,padding:"8px 24px",display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:16}}>{currentCat.emoji}</span>
        <span style={{fontSize:13,color:C.sageDark,fontWeight:600}}>{currentCat.label}</span>
        <button onClick={()=>setShowCatPicker(true)} style={{...base,marginLeft:4,background:"none",border:`1px solid ${C.sageMid}`,borderRadius:6,padding:"2px 10px",fontSize:12,color:C.sage,cursor:"pointer"}}>Change</button>
      </div>
      <div style={{height:220,overflow:"hidden",position:"relative",background:"#1a1a1a",cursor:"pointer"}}
        onMouseEnter={()=>setPhotoHover(true)} onMouseLeave={()=>setPhotoHover(false)} onClick={()=>photoInputRef.current.click()}>
        {recipe.frontImage
          ?<img src={recipe.frontImage} alt={recipe.title} style={{width:"100%",height:"100%",objectFit:"contain"}}/>
          :<div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8}}>
            <span style={{fontSize:40}}>📷</span><span style={{color:"rgba(255,255,255,0.5)",fontSize:14}}>Tap to add a photo</span>
          </div>}
        <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(0,0,0,0.5) 0%,transparent 60%)"}}/>
        {recipe.totalTime&&<div style={{position:"absolute",bottom:16,left:24,color:"#fff",fontSize:11,opacity:0.8,letterSpacing:1,textTransform:"uppercase"}}>{recipe.totalTime}</div>}
        <div style={{position:"absolute",top:12,right:12,display:"flex",gap:8,opacity:photoHover?1:0,transition:"opacity 0.2s"}}>
          <label onClick={e=>e.stopPropagation()} style={{background:"rgba(0,0,0,0.6)",color:"#fff",borderRadius:8,padding:"6px 12px",fontSize:13,fontWeight:600,cursor:"pointer",backdropFilter:"blur(4px)"}}>
            📷 Replace<input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{if(e.target.files?.[0])handlePhotoChange(e.target.files[0]);}}/>
          </label>
          {recipe.frontImage&&<button onClick={e=>{e.stopPropagation();onUpdatePhoto(recipe.id,null);}} style={{background:"rgba(0,0,0,0.6)",color:"#fff",border:"none",borderRadius:8,padding:"6px 12px",fontSize:13,fontWeight:600,cursor:"pointer",backdropFilter:"blur(4px)"}}>🗑 Remove</button>}
        </div>
        <input ref={photoInputRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{if(e.target.files?.[0])handlePhotoChange(e.target.files[0]);}}/>
      </div>
      <div style={{maxWidth:800,margin:"0 auto",padding:"28px 24px"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
          <div>
            <div style={{background:C.card,borderRadius:12,padding:20,marginBottom:20,border:`1.5px solid ${C.border}`}}>
              <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>How many guests?</div>
              <div style={{fontSize:12,color:C.muted,marginBottom:14}}>Original serves {recipe.servings}</div>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                <button onClick={()=>handleScale(Math.max(1,guestCount-1))} style={{...btnG,padding:"8px 14px",fontSize:18,lineHeight:1}}>−</button>
                <input type="number" min={1} value={guestCount} onChange={e=>handleScale(parseInt(e.target.value)||1)} style={{...inp,width:70,textAlign:"center",fontSize:22,fontWeight:700,padding:8}}/>
                <button onClick={()=>handleScale(guestCount+1)} style={{...btnG,padding:"8px 14px",fontSize:18,lineHeight:1}}>＋</button>
                <span style={{fontSize:13,color:C.muted}}>{ratio!==1?`${ratio.toFixed(1)}× recipe`:"original"}</span>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {[2,4,6,8,12,20].map(n=>(
                  <button key={n} onClick={()=>handleScale(n)} style={{...base,border:`1.5px solid ${guestCount===n?C.sage:C.border}`,borderRadius:6,padding:"5px 12px",fontSize:13,cursor:"pointer",background:guestCount===n?C.sageLight:"#fff",color:guestCount===n?C.sageDark:C.ink,fontWeight:guestCount===n?700:400}}>{n}</button>
                ))}
              </div>
            </div>
            <div style={{background:C.card,borderRadius:12,border:`1.5px solid ${C.border}`,overflow:"hidden"}}>
              <div style={{padding:"16px 20px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${C.border}`}}>
                <div>
                  <span style={{fontWeight:700,fontSize:15}}>Ingredients</span>
                  {ratio!==1&&!scaling&&<span style={{fontSize:11,color:C.sage,fontWeight:600,marginLeft:8}}>Scaled ×{ratio.toFixed(1)}</span>}
                  {scaling&&<span style={{fontSize:11,color:C.muted,marginLeft:8}}>Scaling…</span>}
                </div>
                <button onClick={()=>setShowChecklist(true)} style={{...btnP,padding:"6px 14px",fontSize:12}}>Gather List</button>
              </div>
              {scaledIng.map((ing,i)=>(
                <div key={i} style={{display:"flex",gap:10,padding:"9px 20px",borderBottom:i<scaledIng.length-1?`1px solid ${C.border}`:"none",fontSize:14,color:C.ink}}>
                  <span style={{color:C.sage,flexShrink:0,marginTop:2}}>●</span><span>{ing.display}</span>
                </div>
              ))}
              {(recipe.ingredientsNeeded||[]).length>0&&<>
                <div style={{padding:"10px 20px 6px",fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:C.muted,borderTop:`1px solid ${C.border}`,marginTop:4}}>You'll also need</div>
                {(recipe.ingredientsNeeded||[]).map((n,i)=>(
                  <div key={i} style={{display:"flex",gap:10,padding:"7px 20px",borderBottom:i<(recipe.ingredientsNeeded.length-1)?`1px solid ${C.border}`:"none",fontSize:13,color:C.muted}}>
                    <span style={{flexShrink:0,marginTop:2}}>○</span><span>{n}</span>
                  </div>
                ))}
              </>}
            </div>
          </div>
          <div>
            <div style={{background:C.card,borderRadius:12,padding:20,marginBottom:20,border:`1.5px solid ${C.border}`}}>
              <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>Steps ({recipe.steps.length})</div>
              {recipe.steps.map((step,i)=>(
                <div key={i} style={{display:"flex",gap:12,marginBottom:12,alignItems:"flex-start"}}>
                  <div style={{minWidth:24,height:24,borderRadius:"50%",background:"linear-gradient(135deg,#6B4FC8,#8B6DE0)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0,marginTop:1}}>{i+1}</div>
                  <div>
                    {typeof step==="object"&&step.title&&<div style={{fontSize:13,fontWeight:700,color:C.ink,marginBottom:2}}>{step.title}</div>}
                    <div style={{fontSize:13,lineHeight:1.5,color:C.muted}}>{typeof step==="object"?step.body:step}</div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{background:C.card,borderRadius:12,padding:20,border:`1.5px solid ${C.border}`}}>
              <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>Ask a question</div>
              <div style={{fontSize:12,color:C.muted,marginBottom:14}}>e.g. "What do I need for {guestCount} people?"</div>
              {chat.length>0&&(
                <div ref={chatRef} style={{maxHeight:240,overflowY:"auto",marginBottom:12,display:"flex",flexDirection:"column",gap:10}}>
                  {chat.map((m,i)=>(<div key={i} style={{alignSelf:m.role==="user"?"flex-end":"flex-start",maxWidth:"85%",background:m.role==="user"?C.sage:C.sageLight,color:m.role==="user"?"#fff":C.ink,borderRadius:m.role==="user"?"12px 12px 4px 12px":"12px 12px 12px 4px",padding:"10px 14px",fontSize:13,lineHeight:1.5}}>{m.content}</div>))}
                  {asking&&<div style={{alignSelf:"flex-start",background:C.sageLight,borderRadius:"12px 12px 12px 4px",padding:"10px 14px"}}><span style={{animation:"pulse 1s infinite",display:"inline-block"}}>●●●</span></div>}
                </div>
              )}
              <div style={{display:"flex",gap:8}}>
                <input value={question} onChange={e=>setQuestion(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleAsk()} placeholder="Ask anything…" style={{...inp,flex:1,fontSize:13}}/>
                <button onClick={handleAsk} disabled={!question.trim()||asking} style={{...btnP,padding:"8px 16px",opacity:(!question.trim()||asking)?0.4:1}}>Ask</button>
              </div>
            </div>
          </div>
        </div>
        <button onClick={()=>setShowChecklist(true)} style={{...btnP,background:C.orange,width:"100%",padding:15,fontSize:17,marginTop:24}}>
          Gather Ingredients &amp; Cook →
        </button>
      </div>
      {showChecklist&&<IngredientChecklist ingredients={scaledIng} onDone={handleDone}/>}
      {showCatPicker&&<CategoryPicker current={detectCategory(recipe.title,recipe.category)} onSelect={id=>{onUpdateCategory(recipe.id,id);setShowCatPicker(false);}} onClose={()=>setShowCatPicker(false)}/>}
    </div>
  );
}

// ── Cook Screen ───────────────────────────────────────────────────────────────
function CookScreen({recipe,guestCount,scaledIngredients,onBack}) {
  const [idx,setIdx]=useState(0); const [voiceOn,setVoiceOn]=useState(false); const [flash,setFlash]=useState(false);
  const [showIng,setShowIng]=useState(false); const [iosDis,setIosDis]=useState(false);
  const total=recipe.steps.length;
  const {ok:wakeLockOk,isIOS}=useWakeLock(true);
  const goNext=useCallback(()=>{setIdx(i=>Math.min(i+1,total-1));setFlash(true);setTimeout(()=>setFlash(false),500);},[total]);
  useVoice(goNext,voiceOn);
  const prog=((idx+1)/total)*100; const isLast=idx===total-1;
  const step=recipe.steps[idx];
  const sTitle=typeof step==="object"?step.title:`Step ${idx+1}`;
  const sBody=typeof step==="object"?step.body:step;

  return (
    <div style={{...base,minHeight:"100vh",background:C.dark,color:"#F5F2ED",display:"flex",flexDirection:"column"}}>
      {isIOS&&!iosDis&&<div style={{background:"#7A4F00",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,fontSize:13}}>
        <span>📱 Keep screen on: <strong>Settings → Display &amp; Brightness → Auto-Lock → Never</strong></span>
        <button onClick={()=>setIosDis(true)} style={{background:"none",border:"none",color:"#fff",fontSize:20,cursor:"pointer",lineHeight:1}}>×</button>
      </div>}
      {wakeLockOk&&!isIOS&&<div style={{background:"rgba(74,124,89,0.25)",padding:"6px 16px",fontSize:12,color:C.sageMid,textAlign:"center"}}>🔒 Screen will stay on while cooking</div>}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 22px"}}>
        <button onClick={onBack} style={btnD}>← Detail</button>
        <div style={{fontSize:13,color:"rgba(255,255,255,0.4)",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{recipe.title}{guestCount!==recipe.servings?` · ${guestCount} servings`:""}</div>
        <button onClick={()=>setShowIng(!showIng)} style={btnD}>🧄</button>
      </div>
      <div style={{height:3,background:"rgba(255,255,255,0.07)",margin:"0 22px"}}>
        <div style={{height:"100%",width:`${prog}%`,background:C.sage,transition:"width 0.4s ease",borderRadius:2}}/>
      </div>
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px 40px"}}>
        <div style={{maxWidth:680,width:"100%"}}>
          <div style={{display:"flex",alignItems:"center",gap:20,marginBottom:28}}>
            <div style={{width:72,height:72,borderRadius:"50%",background:"linear-gradient(135deg,#6B4FC8,#8B6DE0)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:"0 4px 20px rgba(107,79,200,0.4)"}}>
              <span style={{fontSize:28,fontWeight:900,color:"#fff",fontFamily:"sans-serif",letterSpacing:-1}}>{String(idx+1).padStart(2,"0")}</span>
            </div>
            <div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>Step {idx+1} of {total}</div>
              <div style={{fontSize:"clamp(22px,3vw,32px)",fontWeight:700,color:"#F5F2ED",lineHeight:1.2}}>{sTitle}</div>
            </div>
          </div>
          <div style={{fontSize:"clamp(17px,2.2vw,22px)",lineHeight:1.65,color:"rgba(245,242,237,0.88)",paddingLeft:92}}>{sBody}</div>
        </div>
      </div>
      <div style={{padding:"20px 32px 36px",display:"flex",alignItems:"center",justifyContent:"center",gap:18}}>
        <button onClick={()=>setIdx(i=>Math.max(i-1,0))} disabled={idx===0} style={{...btnD,opacity:idx===0?0.25:1,cursor:idx===0?"default":"pointer"}}>← Back</button>
        <button onClick={()=>setVoiceOn(v=>!v)} style={{border:"none",borderRadius:"50%",width:62,height:62,fontSize:22,cursor:"pointer",transition:"all 0.2s",background:flash?C.sageMid:voiceOn?C.sage:"rgba(255,255,255,0.08)",transform:flash?"scale(1.15)":"scale(1)",boxShadow:voiceOn?`0 0 0 5px rgba(74,124,89,0.3)`:"none"}}>🎙</button>
        <button onClick={goNext} disabled={isLast} style={{...btnP,background:isLast?"rgba(255,255,255,0.08)":C.orange,color:isLast?"rgba(255,255,255,0.25)":"#fff",padding:"12px 26px",fontSize:15,cursor:isLast?"default":"pointer"}}>{isLast?"Done ✓":"Next →"}</button>
      </div>
      {voiceOn&&<div style={{background:"rgba(74,124,89,0.15)",borderTop:"1px solid rgba(74,124,89,0.3)",padding:"9px 16px",textAlign:"center",fontSize:13,color:C.sageMid}}>
        🎙 Say <strong style={{color:"#F5F2ED"}}>"next step"</strong>, <strong style={{color:"#F5F2ED"}}>"ok what's next"</strong>, or <strong style={{color:"#F5F2ED"}}>"continue"</strong>
      </div>}
      {isLast&&<div style={{position:"fixed",bottom:100,left:"50%",transform:"translateX(-50%)",background:C.sage,color:"#fff",padding:"11px 22px",borderRadius:50,fontSize:15,fontWeight:600,pointerEvents:"none",boxShadow:"0 4px 20px rgba(74,124,89,0.4)"}}>🎉 Enjoy your meal!</div>}
      {showIng&&(
        <div style={{position:"fixed",top:0,right:0,height:"100vh",width:280,background:"#1E1E1E",borderLeft:"1px solid rgba(255,255,255,0.07)",overflowY:"auto",padding:"20px 18px",zIndex:100,boxShadow:"-8px 0 32px rgba(0,0,0,0.5)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
            <div><div style={{fontWeight:700,fontSize:15}}>Ingredients</div>{guestCount!==recipe.servings&&<div style={{fontSize:11,color:C.sageMid,marginTop:2}}>Scaled for {guestCount} servings</div>}</div>
            <button onClick={()=>setShowIng(false)} style={{background:"none",border:"none",color:C.muted,fontSize:22,cursor:"pointer",lineHeight:1}}>×</button>
          </div>
          {scaledIngredients.map((ing,i)=>(
            <div key={i} style={{padding:"9px 0",borderBottom:"1px solid rgba(255,255,255,0.05)",fontSize:13,color:"rgba(245,242,237,0.8)",display:"flex",gap:10}}>
              <span style={{color:C.sageMid,flexShrink:0}}>●</span>{ing.display}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [hasKey,setHasKey]=useState(!!getApiKey());
  const [screen,setScreen]=useState("home");
  const [activeCategory,setActiveCategory]=useState(null);
  const [recipes,setRecipes]=useState(()=>loadRecipes());
  const [schedule,setSchedule]=useState(()=>loadSchedule());
  const [active,setActive]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  const [exitPrompt,setExitPrompt]=useState(false);

  const handleUpdateSchedule=s=>{setSchedule(s);saveSchedule(s);};

  useEffect(()=>{
    const onBack=e=>{
      e.preventDefault();
      if(screen==="cook"){setScreen("detail");return;}
      if(screen==="detail"){setScreen(active?.fromPlanner?"planner":"recipelist");return;}
      if(screen==="recipelist"){setScreen("catalog");return;}
      if(screen==="catalog"){setScreen("home");return;}
      if(screen==="planner"){setScreen("home");return;}
      if(screen==="scan"){setScreen(activeCategory?"recipelist":"catalog");return;}
      if(showSettings){setShowSettings(false);return;}
      if(exitPrompt){window.history.back();return;}
      setExitPrompt(true);setTimeout(()=>setExitPrompt(false),2000);
    };
    window.history.pushState(null,"",window.location.href);
    window.addEventListener("popstate",onBack);
    return()=>window.removeEventListener("popstate",onBack);
  },[screen,showSettings,exitPrompt,activeCategory,active]);

  useEffect(()=>{window.history.pushState(null,"",window.location.href);},[screen]);

  const handleSaved=r=>{const next=[r,...recipes];setRecipes(next);saveRecipes(next);setScreen(activeCategory?"recipelist":"catalog");};
  const handleDelete=id=>{const next=recipes.filter(r=>r.id!==id);setRecipes(next);saveRecipes(next);};
  const handleUpdatePhoto=(id,img)=>{const next=recipes.map(r=>r.id===id?{...r,frontImage:img}:r);setRecipes(next);saveRecipes(next);if(active?.recipe?.id===id)setActive(p=>({...p,recipe:{...p.recipe,frontImage:img}}));};
  const handleUpdateCategory=(id,catId)=>{const next=recipes.map(r=>r.id===id?{...r,category:catId}:r);setRecipes(next);saveRecipes(next);if(active?.recipe?.id===id)setActive(p=>({...p,recipe:{...p.recipe,category:catId}}));};

  const goToRecipe=(r,fromPlanner=false)=>{setActive({recipe:r,guestCount:r.servings,scaledIngredients:scaleIngredients(r,r.servings),fromPlanner});setScreen("detail");};

  if(!hasKey||showSettings) return <ApiKeyScreen onSaved={()=>{setHasKey(true);setShowSettings(false);}}/>;
  if(screen==="scan") return <ScanScreen onBack={()=>setScreen(activeCategory?"recipelist":"catalog")} onSaved={handleSaved}/>;
  if(screen==="detail"&&active?.recipe) return (
    <DetailScreen recipe={active.recipe}
      onBack={()=>setScreen(active?.fromPlanner?"planner":"recipelist")}
      onUpdatePhoto={handleUpdatePhoto} onUpdateCategory={handleUpdateCategory}
      onCook={(r,g,s)=>{setActive(p=>({...p,recipe:r,guestCount:g,scaledIngredients:s}));setScreen("cook");}}/>
  );
  if(screen==="cook"&&active?.recipe) return (
    <CookScreen recipe={active.recipe} guestCount={active.guestCount} scaledIngredients={active.scaledIngredients} onBack={()=>setScreen("detail")}/>
  );
  if(screen==="recipelist"&&activeCategory) return (
    <RecipeListScreen recipes={recipes} categoryId={activeCategory}
      onBack={()=>setScreen("catalog")}
      onSelect={r=>goToRecipe(r)}
      onDelete={handleDelete} onAdd={()=>setScreen("scan")}/>
  );
  if(screen==="catalog") return (
    <CategoryScreen recipes={recipes}
      onBack={()=>setScreen("home")}
      onSelectCategory={id=>{setActiveCategory(id);setScreen("recipelist");}}
      onAdd={()=>setScreen("scan")}/>
  );
  if(screen==="planner") return (
    <PlannerScreen recipes={recipes} schedule={schedule}
      onUpdateSchedule={handleUpdateSchedule}
      onBack={()=>setScreen("home")}
      onViewRecipe={r=>goToRecipe(r,true)}/>
  );

  return (
    <>
      <HomeScreen
        recipes={recipes}
        schedule={schedule}
        onCatalog={()=>setScreen("catalog")}
        onPlanner={()=>setScreen("planner")}
        onAdd={()=>{setActiveCategory(null);setScreen("scan");}}
        onSettings={()=>setShowSettings(true)}/>
      {exitPrompt&&<div style={{position:"fixed",bottom:40,left:"50%",transform:"translateX(-50%)",background:"rgba(0,0,0,0.8)",color:"#fff",padding:"12px 24px",borderRadius:50,fontSize:15,fontWeight:600,zIndex:999,whiteSpace:"nowrap"}}>Tap back again to exit</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
