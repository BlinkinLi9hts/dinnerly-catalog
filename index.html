const { useState, useEffect, useRef, useCallback, useMemo } = React;

const API_KEY_STORAGE  = "dinnerly-api-key";
const SECRET_STORAGE   = "dinnerly-secret";
const STORAGE_KEY      = "dinnerly-recipes-v2";  // legacy local only
const SCHEDULE_KEY     = "dinnerly-schedule-v1"; // legacy local only
const SHOP_CHECKED_KEY = "dinnerly-shop-checked-v1";

function getApiKey() { return localStorage.getItem(API_KEY_STORAGE) || ""; }
function setApiKey(k) { localStorage.setItem(API_KEY_STORAGE, k); }
function getDinnSecret() { return localStorage.getItem(SECRET_STORAGE) || ""; }
function setDinnSecret(k) { localStorage.setItem(SECRET_STORAGE, k); }

// Cloud API helpers
async function cloudGet(endpoint) {
  const res = await fetch(`/api/${endpoint}`);
  if (!res.ok) throw new Error(`GET /api/${endpoint} failed: ${res.status}`);
  return res.json();
}
async function cloudPost(endpoint, data) {
  const secret = getDinnSecret();
  const res = await fetch(`/api/${endpoint}`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-Dinnerly-Secret": secret },
    body: JSON.stringify(data),
  });
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err.error || `POST /api/${endpoint} failed: ${res.status}`);
  }
  return res.json();
}

async function loadRecipes() {
  try { return await cloudGet("recipes"); }
  catch { return []; }
}
async function saveRecipes(recipes) {
  try { await cloudPost("recipes", recipes); } catch(e) { console.error("saveRecipes:", e); }
}
async function loadSchedule() {
  try { return await cloudGet("schedule"); }
  catch { return {}; }
}
async function saveSchedule(s) {
  try { await cloudPost("schedule", s); } catch(e) { console.error("saveSchedule:", e); }
}
function loadShopChecked() { try { const c=localStorage.getItem(SHOP_CHECKED_KEY); return c?JSON.parse(c):{}; } catch { return {}; } }
function saveShopChecked(c) { try { localStorage.setItem(SHOP_CHECKED_KEY, JSON.stringify(c)); } catch {} }

// Check if user has local recipes that haven't been migrated yet
function getLocalRecipes() { try { const r=localStorage.getItem(STORAGE_KEY); return r?JSON.parse(r):[]; } catch { return []; } }
function getLocalSchedule() { try { const s=localStorage.getItem(SCHEDULE_KEY); return s?JSON.parse(s):{}; } catch { return {}; } }
function clearLocalData() { localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(SCHEDULE_KEY); }

async function callClaude(messages, system="", maxTokens=1200) {
  const key=getApiKey(); if (!key) throw new Error("NO_API_KEY");
  const body={model:"claude-sonnet-4-6",max_tokens:maxTokens,messages};
  if (system) body.system=system;
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify(body),
  });
  if (!res.ok) { const e=await res.json(); throw new Error(e.error?.message||"API error"); }
  const data=await res.json();
  return data.content?.find(b=>b.type==="text")?.text||"";
}

function compressImage(dataUrl, maxWidth=800, quality=0.72) {
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const ratio=Math.min(1,maxWidth/img.width);
      const w=Math.round(img.width*ratio), h=Math.round(img.height*ratio);
      const canvas=document.createElement("canvas"); canvas.width=w; canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      res(canvas.toDataURL("image/jpeg",quality));
    };
    img.src=dataUrl;
  });
}

function imgBlock(base64,mediaType) { return {type:"image",source:{type:"base64",media_type:mediaType,data:base64}}; }

async function parseRecipeCards(frontB64,frontType,backB64,backType) {
  const text=await callClaude([{role:"user",content:[
    imgBlock(frontB64,frontType),
    {type:"text",text:"This is the FRONT of a Dinnerly recipe card (title, photo, time, servings)."},
    imgBlock(backB64,backType),
    {type:"text",text:`This is the BACK of the same Dinnerly recipe card.
Dinnerly cards have these distinct sections -- extract each separately:
1. "What We Send" -- main ingredients with measurements
2. "What You Need" -- pantry staples, rarely have measurements (e.g. "kosher salt", "olive oil")
3. "Tools" -- kitchen utensils needed (e.g. "medium saucepan", "large skillet")
4. Steps / instructions

Return ONLY valid JSON, no markdown, no backticks:
{
  "title": "...",
  "servings": 4,
  "totalTime": "20 min",
  "ingredientsSent": [
    { "name": "elbow macaroni", "qty": 0.5, "unit": "lb", "display": "1/2 lb elbow macaroni" }
  ],
  "ingredientsNeeded": ["kosher salt & ground pepper", "olive oil"],
  "tools": ["medium saucepan", "large skillet"],
  "steps": [
    { "title": "Cook pasta", "body": "Full instruction text." }
  ],
  "nutrition": { "calories": 780, "protein": "46g", "carbs": "71g", "fat": "30g" }
}
Rules:
- servings must be a NUMBER (integer)
- ingredientsSent: ONLY items from "What We Send" that have a clear quantity and unit. qty must be a positive number.
- ingredientsNeeded: items from "What You Need" AND any ingredient with no quantity, "to taste", or that is a pantry staple like salt, pepper, oil, butter, water
- Do NOT put "to taste" items or unmeasured items in ingredientsSent
- tools: simple string array
- Each step needs a SHORT title (2-4 words) and body (full instruction)
- Split compound paragraphs into individual steps`}
  ]}],"",2000);
  const clean=text.replace(/```json|```/g,"").trim();
  const parsed=JSON.parse(clean);
  if (!parsed.ingredients) parsed.ingredients=parsed.ingredientsSent||[];
  // Post-process: move "to taste" / zero-qty items from ingredientsSent to ingredientsNeeded
  return cleanIngredients(parsed);
}

function cleanIngredients(parsed) {
  const TO_TASTE=/to taste|as needed|as desired|to season|pinch of/i;
  const sent=[]; const extra=[];
  (parsed.ingredientsSent||parsed.ingredients||[]).forEach(ing=>{
    if (!ing.qty || ing.qty<=0 || TO_TASTE.test(ing.display||"") || TO_TASTE.test(ing.name||"")) {
      extra.push(ing.display||ing.name);
    } else {
      sent.push(ing);
    }
  });
  const needed=Array.from(new Set([...(parsed.ingredientsNeeded||[]),...extra]));
  return {...parsed, ingredientsSent:sent, ingredients:sent, ingredientsNeeded:needed};
}

function formatQty(qty,unit,name) {
  const fractions=[[0.125,"\u215b"],[0.25,"\u00bc"],[0.333,"\u2153"],[0.5,"\u00bd"],[0.667,"\u2154"],[0.75,"\u00be"]];
  const whole=Math.floor(qty), frac=qty-whole;
  let q=whole>0?String(whole):"";
  const match=fractions.find(([v])=>Math.abs(frac-v)<0.05);
  if (match) q+=match[1]; else if (frac>0.05) q+=` ${frac.toFixed(1).replace(/\.?0+$/,"")}`;
  return `${q.trim()} ${unit} ${name}`.trim();
}

function scaleIngredients(recipe,n) {
  const src=recipe.ingredientsSent||recipe.ingredients||[];
  const ratio=n/recipe.servings;
  return src.map(ing=>({...ing,qty:ing.qty*ratio,display:formatQty(ing.qty*ratio,ing.unit,ing.name)}));
}

async function askScalerQuestion(recipe,n,question,history) {
  const scaled=scaleIngredients(recipe,n);
  const system=`Cooking assistant for "${recipe.title}". Original: ${recipe.servings} servings. Scaled to: ${n} servings.
INGREDIENTS: ${scaled.map(i=>`- ${i.display}`).join("\n")}
STEPS: ${recipe.steps.map((s,i)=>`${i+1}. ${typeof s==="object"?s.title+": "+s.body:s}`).join("\n")}
Answer concisely. Use scaled quantities.`;
  return callClaude([...history.map(h=>({role:h.role,content:h.content})),{role:"user",content:question}],system,600);
}

function buildShoppingList(schedule, recipes) {
  const recipeMap={};
  recipes.forEach(r=>recipeMap[r.id]=r);
  const sentMap={};
  const neededSet=new Set();
  const toolsSet=new Set();
  const TO_TASTE=/to taste|as needed|as desired|to season|pinch of/i;
  const DAYS=["mon","tue","wed","thu","fri","sat","sun"];
  DAYS.forEach(day=>{
    const rid=schedule[day]; if (!rid) return;
    const r=recipeMap[rid]; if (!r) return;
    const src=r.ingredientsSent||r.ingredients||[];
    src.forEach(ing=>{
      // Route "to taste" / zero-qty to pantry staples
      if (!ing.qty || ing.qty<=0 || TO_TASTE.test(ing.display||"") || TO_TASTE.test(ing.name||"")) {
        neededSet.add(ing.display||ing.name);
        return;
      }
      const key=`${ing.name.toLowerCase().trim()}|${(ing.unit||"").toLowerCase().trim()}`;
      if (sentMap[key]) { sentMap[key].qty+=ing.qty||0; sentMap[key].recipes.push(r.title); }
      else { sentMap[key]={name:ing.name,unit:ing.unit||"",qty:ing.qty||0,recipes:[r.title]}; }
    });
    (r.ingredientsNeeded||[]).forEach(n=>neededSet.add(n.trim()));
    (r.tools||[]).forEach(t=>toolsSet.add(t.trim()));
  });
  const sent=Object.values(sentMap).map(item=>({...item,display:formatQty(item.qty,item.unit,item.name)}));
  return { sent, needed:Array.from(neededSet).sort(), tools:Array.from(toolsSet).sort() };
}

// Fuzzy duplicate detection — normalize title, check word overlap
function fuzzyTitleMatch(a, b) {
  const norm = s => s.toLowerCase().replace(/[^a-z0-9\s]/g,"").replace(/\s+/g," ").trim();
  const words = s => new Set(norm(s).split(" ").filter(w=>w.length>2));
  const wa=words(a), wb=words(b);
  if(wa.size===0||wb.size===0) return false;
  let overlap=0; wa.forEach(w=>{if(wb.has(w))overlap++;});
  const score=overlap/Math.min(wa.size,wb.size);
  return score>=0.6;
}
function findDuplicates(title, recipes) {
  return recipes.filter(r=>fuzzyTitleMatch(r.title, title));
}

function detectCategory(title,saved) {
  if (saved&&saved!=="other") return saved;
  const t=(title||"").toLowerCase();
  for (const cat of CATEGORIES) {
    if (cat.id==="other") continue;
    if (cat.keywords.some(k=>t.includes(k))) return cat.id;
  }
  return "other";
}
function getCategoryInfo(id) { return CATEGORIES.find(c=>c.id===id)||CATEGORIES[CATEGORIES.length-1]; }

function speak(text) { window.speechSynthesis?.cancel(); const u=new SpeechSynthesisUtterance(text); u.rate=0.95; u.pitch=1; u.volume=1; window.speechSynthesis?.speak(u); }
function stopSpeaking() { window.speechSynthesis?.cancel(); }

const NEXT_PHRASES=["next step","ok what's next","what's next","continue","okay what's next","move on"];
const START_PHRASES=["i've got all the ingredients","i have all the ingredients","ready to start cooking","ready to cook","let's start cooking","let's cook","start cooking","all ingredients ready","ingredients are ready"];
const WHATS_LEFT_PHRASES=["what's left","whats left","what do i still need","what's remaining","whats remaining","read the list","what else","read it to me","what do i need","what is left"];
const GOT_THAT_PHRASES=["got that","got it","got that one","have that","i have that","check that","yep got it","check it","next one","got one","i got it","i got that"];

function useVoice(onNext,active) {
  const ref=useRef(active); ref.current=active;
  useEffect(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if (!SR||!active) return;
    const rec=new SR(); rec.continuous=true; rec.interimResults=false; rec.lang="en-US";
    rec.onresult=e=>{const t=e.results[e.results.length-1][0].transcript.toLowerCase().trim(); if(NEXT_PHRASES.some(p=>t.includes(p)))onNext();};
    rec.onend=()=>{if(ref.current)try{rec.start();}catch{}};
    try{rec.start();}catch{}
    return()=>{try{rec.stop();}catch{}};
  },[active]);
}

function useChecklistVoice({active,ingredients,checked,onCheck,onGotAll,onHeard}) {
  const sr=useRef({ingredients,checked}); sr.current={ingredients,checked};
  useEffect(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if (!SR||!active) return;
    const rec=new SR(); rec.continuous=true; rec.interimResults=false; rec.lang="en-US";
    rec.onresult=e=>{
      const t=e.results[e.results.length-1][0].transcript.toLowerCase().trim();
      if (onHeard) onHeard(t);
      const {ingredients,checked}=sr.current;
      if (START_PHRASES.some(p=>t.includes(p))){stopSpeaking();onGotAll();return;}
      if (WHATS_LEFT_PHRASES.some(p=>t.includes(p))){
        const unc=ingredients.filter((_,i)=>!checked[i]);
        unc.length===0?speak("You've got everything! Say ready to cook."):speak("You still need: "+unc.map(i=>i.display||i.name).join(", ")+". Say got that one after each.");
        return;
      }
      if (GOT_THAT_PHRASES.some(p=>t.includes(p))){
        const ni=ingredients.findIndex((_,i)=>!checked[i]);
        if(ni!==-1){onCheck(ni,true);const rem=ingredients.filter((_,i)=>i!==ni&&!checked[i]);rem.length===0?speak("That's everything! Say ready to cook."):speak("Got it. "+rem.length+" left. Next: "+(rem[0].display||rem[0].name)+".");}
        return;
      }
      const mi=ingredients.findIndex((ing,i)=>!checked[i]&&(ing.name||"").toLowerCase().split(/\s+/).some(w=>w.length>3&&t.includes(w)));
      if(mi!==-1){onCheck(mi,true);const rem=ingredients.filter((_,i)=>i!==mi&&!checked[i]);speak(rem.length===0?"That's the last one!":"Got it. "+rem.length+" left.");}
    };
    rec.onend=()=>{if(active)try{rec.start();}catch{}};
    try{rec.start();}catch{}
    return()=>{try{rec.stop();}catch{}};
  },[active]);
}

function useWakeLock(active) {
  const ref=useRef(null);
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  const ok="wakeLock" in navigator&&!isIOS;
  useEffect(()=>{
    if (!active||!ok) return; let gone=false;
    navigator.wakeLock.request("screen").then(l=>{if(!gone)ref.current=l;}).catch(()=>{});
    const onVis=()=>{if(document.visibilityState==="visible"&&!ref.current)navigator.wakeLock.request("screen").then(l=>ref.current=l).catch(()=>{});};
    document.addEventListener("visibilitychange",onVis);
    return()=>{gone=true;document.removeEventListener("visibilitychange",onVis);ref.current?.release().catch(()=>{});ref.current=null;};
  },[active,ok]);
  return {ok,isIOS};
}

// -- Crop Modal (pinch/drag, 16:9 output)
function CropModal({imageDataUrl, onConfirm, onRetake}) {
  const canvasRef=useRef(null);
  const containerRef=useRef(null);
  const st=useRef({scale:1,ox:0,oy:0,lastDist:0,lastX:0,lastY:0,dragging:false,img:null,cw:0,ch:0});
  const [ready,setReady]=useState(false);

  useEffect(()=>{
    const img=new Image();
    img.onload=()=>{
      st.current.img=img;
      const con=containerRef.current; if (!con) return;
      const cw=con.offsetWidth;
      const ch=Math.round(cw*(9/16));
      st.current.cw=cw; st.current.ch=ch;
      const fill=Math.max(cw/img.width,ch/img.height);
      st.current.scale=fill;
      st.current.ox=(cw-img.width*fill)/2;
      st.current.oy=(ch-img.height*fill)/2;
      draw(); setReady(true);
    };
    img.src=imageDataUrl;
  },[imageDataUrl]);

  const draw=()=>{
    const s=st.current;
    if (!s.img||!canvasRef.current) return;
    const c=canvasRef.current;
    c.width=s.cw; c.height=s.ch;
    const ctx=c.getContext("2d");
    ctx.clearRect(0,0,s.cw,s.ch);
    ctx.drawImage(s.img,s.ox,s.oy,s.img.width*s.scale,s.img.height*s.scale);
    ctx.strokeStyle="rgba(255,255,255,0.3)"; ctx.lineWidth=2;
    ctx.strokeRect(1,1,s.cw-2,s.ch-2);
  };

  const clamp=(sc,ox,oy,cw,ch,iw,ih)=>{
    return {ox:Math.min(0,Math.max(cw-iw*sc,ox)),oy:Math.min(0,Math.max(ch-ih*sc,oy))};
  };

  const onTS=e=>{
    e.preventDefault();
    const t=e.touches; const s=st.current;
    if(t.length===1){s.dragging=true;s.lastX=t[0].clientX;s.lastY=t[0].clientY;}
    else if(t.length===2){s.dragging=false;s.lastDist=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}
  };
  const onTM=e=>{
    e.preventDefault();
    const t=e.touches; const s=st.current;
    if(t.length===1&&s.dragging){
      const dx=t[0].clientX-s.lastX; const dy=t[0].clientY-s.lastY;
      s.lastX=t[0].clientX; s.lastY=t[0].clientY;
      const p=clamp(s.scale,s.ox+dx,s.oy+dy,s.cw,s.ch,s.img.width,s.img.height);
      s.ox=p.ox; s.oy=p.oy; draw();
    } else if(t.length===2){
      const dist=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
      const factor=dist/s.lastDist; s.lastDist=dist;
      const cx=(t[0].clientX+t[1].clientX)/2;
      const cy=(t[0].clientY+t[1].clientY)/2;
      const rect=canvasRef.current.getBoundingClientRect();
      const px=cx-rect.left; const py=cy-rect.top;
      const minSc=Math.max(s.cw/s.img.width,s.ch/s.img.height);
      const ns=Math.max(minSc,Math.min(s.scale*factor,8));
      const sr=ns/s.scale;
      const p=clamp(ns,px-(px-s.ox)*sr,py-(py-s.oy)*sr,s.cw,s.ch,s.img.width,s.img.height);
      s.scale=ns; s.ox=p.ox; s.oy=p.oy; draw();
    }
  };
  const onTE=()=>{st.current.dragging=false;};

  const confirm=()=>{
    const s=st.current;
    const OUT_W=1200, OUT_H=675;
    const c=document.createElement("canvas"); c.width=OUT_W; c.height=OUT_H;
    c.getContext("2d").drawImage(s.img,-s.ox/s.scale,-s.oy/s.scale,s.cw/s.scale,s.ch/s.scale,0,0,OUT_W,OUT_H);
    onConfirm(c.toDataURL("image/jpeg",0.82));
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:400,background:"#000",display:"flex",flexDirection:"column"}}>
      <div style={{background:"rgba(0,0,0,0.85)",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button onClick={onRetake} style={{...base,background:"rgba(255,255,255,0.12)",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:14,cursor:"pointer"}}>Retake</button>
        <span style={{color:"rgba(255,255,255,0.65)",fontSize:14}}>Pinch to zoom &bull; Drag to position</span>
        <button onClick={confirm} style={{...btnP,background:C.sage,padding:"8px 18px",fontSize:14}}>Use Photo</button>
      </div>
      <div ref={containerRef} style={{flex:1,overflow:"hidden"}}>
        <canvas ref={canvasRef} style={{display:"block",width:"100%",touchAction:"none"}}
          onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}/>
      </div>
      {!ready&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{color:"#fff",fontSize:16}}>Loading...</div>
      </div>}
    </div>
  );
}

// -- Scan Screen (fast flow: camera -> crop -> camera -> parse -> review)
function ScanScreen({onBack,onSaved}) {
  const [stage,setStage]=useState("front");
  const [front,setFront]=useState(null);
  const [back,setBack]=useState(null);
  const [recipe,setRecipe]=useState(null);
  const [error,setError]=useState(null);
  const frontInputRef=useRef();
  const backInputRef=useRef();

  const readFile=file=>new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>{const d=e.target.result;res({dataUrl:d,base64:d.split(",")[1],type:file.type||"image/jpeg"});};
    r.onerror=rej; r.readAsDataURL(file);
  });

  useEffect(()=>{
    if(stage==="front") setTimeout(()=>frontInputRef.current&&frontInputRef.current.click(),300);
  },[stage]);

  useEffect(()=>{
    if(stage==="back") setTimeout(()=>backInputRef.current&&backInputRef.current.click(),300);
  },[stage]);

  const handleFrontChosen=async file=>{
    const data=await readFile(file);
    setFront(data); setStage("crop");
  };

  const handleCropConfirm=croppedDataUrl=>{
    setFront(prev=>({...prev,croppedDataUrl}));
    setStage("back");
  };

  const handleBackChosen=async file=>{
    const data=await readFile(file);
    setBack(data); setStage("parsing");
    try {
      const parsed=await parseRecipeCards(front.base64,front.type,data.base64,data.type);
      const displaySrc=front.croppedDataUrl||front.dataUrl;
      const compressed=await compressImage(displaySrc,1200,0.82);
      setRecipe({...parsed,id:Date.now(),addedAt:new Date().toISOString(),frontImage:compressed});
      setStage("review");
    } catch(e){
      setError("Could not read the cards: "+e.message);
      setStage("error");
    }
  };

  if(stage==="crop"&&front) return (
    <CropModal imageDataUrl={front.dataUrl}
      onConfirm={handleCropConfirm}
      onRetake={()=>{setFront(null);setStage("front");}}/>
  );

  if(stage==="parsing") return (
    <div style={{...base,minHeight:"100vh",background:C.paper}}>
      <TopBar onBack={onBack} title="Scan Recipe Card"/>
      <div style={{textAlign:"center",padding:"60px 24px"}}>
        {front&&front.croppedDataUrl&&<img src={front.croppedDataUrl} alt="front" style={{height:140,borderRadius:10,boxShadow:"0 2px 12px rgba(0,0,0,0.1)",display:"block",margin:"0 auto 24px"}}/>}
        <div style={{fontSize:20,fontWeight:700,marginBottom:10}}>Reading both sides...</div>
        <div style={{color:C.muted,fontSize:14}}>Extracting ingredients and steps.</div>
        <div style={{marginTop:20,display:"flex",gap:8,justifyContent:"center"}}>
          {[0,1,2].map(i=><div key={i} style={{width:10,height:10,borderRadius:"50%",background:C.sage,animation:`pulse 1.4s ${i*0.2}s infinite`}}/>)}
        </div>
      </div>
    </div>
  );

  if(stage==="review"&&recipe) return (
    <div style={{...base,minHeight:"100vh",background:C.paper}}>
      <TopBar onBack={onBack} title="Scan Recipe Card"/>
      <div style={{maxWidth:680,margin:"32px auto",padding:"0 24px"}}>
        <ReviewForm recipe={recipe} onSave={r=>onSaved(r)} onBack={()=>setStage("front")}/>
      </div>
    </div>
  );

  if(stage==="error") return (
    <div style={{...base,minHeight:"100vh",background:C.paper}}>
      <TopBar onBack={onBack} title="Scan Recipe Card"/>
      <div style={{maxWidth:480,margin:"60px auto",padding:"0 24px",textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:16}}>!</div>
        <div style={{fontSize:18,fontWeight:700,color:C.ink,marginBottom:8}}>Could not read the card</div>
        <div style={{color:C.muted,fontSize:14,marginBottom:24}}>{error}</div>
        <button onClick={()=>{setFront(null);setBack(null);setError(null);setStage("front");}} style={{...btnP,padding:"12px 28px",fontSize:15}}>Start Over</button>
      </div>
    </div>
  );

  return (
    <div style={{...base,minHeight:"100vh",background:C.paper}}>
      <TopBar onBack={onBack} title="Scan Recipe Card"/>
      <input ref={frontInputRef} type="file" accept="image/*" capture="environment" style={{display:"none"}}
        onChange={e=>{if(e.target.files&&e.target.files[0])handleFrontChosen(e.target.files[0]);}}/>
      <input ref={backInputRef} type="file" accept="image/*" capture="environment" style={{display:"none"}}
        onChange={e=>{if(e.target.files&&e.target.files[0])handleBackChosen(e.target.files[0]);}}/>
      <div style={{maxWidth:480,margin:"0 auto",padding:"60px 24px",textAlign:"center"}}>
        <div style={{fontSize:64,marginBottom:20}}>{stage==="back"?"\ud83d\udcc4":"\ud83d\udcf7"}</div>
        <div style={{fontSize:22,fontWeight:700,color:C.ink,marginBottom:8}}>
          {stage==="back"?"Now scan the back":"Opening camera..."}
        </div>
        <div style={{fontSize:14,color:C.muted,marginBottom:32}}>
          {stage==="back"?"Point at the ingredients and steps side":"Point at the front of the Dinnerly card"}
        </div>
        {stage==="front"&&<button onClick={()=>frontInputRef.current&&frontInputRef.current.click()} style={{...btnP,padding:"12px 28px",fontSize:16}}>Open Camera</button>}
        {stage==="back"&&<button onClick={()=>backInputRef.current&&backInputRef.current.click()} style={{...btnP,padding:"12px 28px",fontSize:16}}>Open Camera</button>}
      </div>
    </div>
  );
}

function DetailScreen({recipe,onBack,onCook,onUpdatePhoto,onUpdateCategory,plannerPickDay,plannerDayLabel,onAddToPlanner}) {

  const photoInputRef=useRef(); const chatRef=useRef();
  const currentCat=getCategoryInfo(detectCategory(recipe.title,recipe.category));

  const handlePhotoChange=async file=>{
    if(!file) return;
    const reader=new FileReader();
    reader.onload=async e=>{const compressed=await compressImage(e.target.result);onUpdatePhoto(recipe.id,compressed);};
    reader.readAsDataURL(file);
  };
  const handleScale=count=>{setGuestCount(count);setScaling(true);setScaledIng(scaleIngredients(recipe,count));setScaling(false);};
  const handleAsk=async()=>{
    if(!question.trim()||asking) return;
    const q=question.trim(); setQuestion("");
    const h=[...chat,{role:"user",content:q}]; setChat(h); setAsking(true);
    try{const a=await askScalerQuestion(recipe,guestCount,q,chat);setChat([...h,{role:"assistant",content:a}]);}
    catch(e){setChat([...h,{role:"assistant",content:"Error: "+e.message}]);}
    setAsking(false); setTimeout(()=>chatRef.current?.scrollTo({top:9999,behavior:"smooth"}),100);
  };
  const handleDone=useCallback(()=>{setShowChecklist(false);onCook(recipe,guestCount,scaledIng);},[recipe,guestCount,scaledIng,onCook]);
  const ratio=guestCount/recipe.servings;

  return (

        onMouseEnter={()=>setPhotoHover(true)} onMouseLeave={()=>setPhotoHover(false)} onClick={()=>photoInputRef.current.click()}>
        {recipe.frontImage
          ?<img src={recipe.frontImage} alt={recipe.title} style={{width:"100%",height:"100%",objectFit:"contain"}}/>
          :<div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8}}>

function seedIfEmpty() {
  // Only seed if there is NO shared secret configured yet (true first-time setup on a fresh device)
  // Once a secret exists, cloud is the source of truth -- don't inject local seed data
  try{
    if(localStorage.getItem(SECRET_STORAGE)) return; // already set up, cloud is source of truth
    const e=localStorage.getItem("dinnerly-recipes-v2");const a=e?JSON.parse(e):[];
    if(a.length===0)localStorage.setItem("dinnerly-recipes-v2",JSON.stringify([SEED_RECIPE]));
  }catch(e){}
}

function SecretScreen({onSaved}) {
  const [secret,setSecret]=useState(""); const [err,setErr]=useState(""); const [testing,setTesting]=useState(false); const [show,setShow]=useState(false);
  const save=async()=>{
    const s=secret.trim();
    if(!s){setErr("Please enter the shared password");return;}
    setTesting(true);setErr("");
    try {
      // Validate secret safely: GET current recipes first, then re-POST same data back
      // This avoids writing null/garbage to KV during the test
      const getRes=await fetch("/api/recipes");
      if(!getRes.ok){setErr("Could not reach server");setTesting(false);return;}
      const currentRecipes=await getRes.json().catch(()=>[]);
      const testRes=await fetch("/api/recipes",{method:"POST",headers:{"Content-Type":"application/json","X-Dinnerly-Secret":s},body:JSON.stringify(currentRecipes||[])});
      if(testRes.status===401){setErr("Wrong password");setTesting(false);return;}
      if(!testRes.ok){setErr("Server error: "+testRes.status);setTesting(false);return;}
      onSaved(s);
    } catch(e){setErr("Could not connect: "+e.message);}
    setTesting(false);
  };
  return (
    <div style={{...base,minHeight:"100vh",background:C.paper,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{background:C.card,borderRadius:16,padding:32,maxWidth:480,width:"100%",boxShadow:"0 4px 32px rgba(0,0,0,0.08)"}}>
        <div style={{fontSize:28,fontWeight:700,color:C.plum,marginBottom:6}}>Dinnerly</div>
        <div style={{fontSize:14,color:C.muted,marginBottom:24}}>Enter the shared catalog password</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:16,lineHeight:1.5}}>This is the <strong>DINNERLY_SECRET</strong> you set in Cloudflare. Same for all devices.</div>
        <div style={{position:"relative",marginBottom:16}}>
          <input type={show?"text":"password"} value={secret} onChange={e=>setSecret(e.target.value)} onKeyDown={e=>e.key==="Enter"&&save()}
            placeholder="your shared password" style={{...inp,fontSize:15,paddingRight:48}} autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false"/>
          <button onClick={()=>setShow(v=>!v)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:18,color:C.muted}}>{show?"🙈":"👁"}</button>
        </div>
        {err&&<div style={{color:"#b03020",fontSize:13,marginBottom:12,padding:"10px 12px",background:"#fff0ee",borderRadius:6}}>{err}</div>}
        <button onClick={save} disabled={testing||!secret.trim()} style={{...btnP,background:C.plum,width:"100%",padding:14,fontSize:16,opacity:(testing||!secret.trim())?0.5:1}}>{testing?"Checking...":"Connect"}</button>
      </div>
    </div>
  );
}

function App() {
  const [hasKey,setHasKey]=useState(!!getApiKey());
  const [hasSecret,setHasSecret]=useState(!!getDinnSecret());
  const [screen,setScreen]=useState("home");
  const [activeCategory,setActiveCategory]=useState(null);
  const [recipes,setRecipes]=useState([]);
  const [schedule,setSchedule]=useState({});
  const [active,setActive]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  const [exitPrompt,setExitPrompt]=useState(false);
  const [plannerPickDay,setPlannerPickDay]=useState(null);
  const [loading,setLoading]=useState(true);
  const [saveStatus,setSaveStatus]=useState(null);
  const [migrationPending,setMigrationPending]=useState(false);
  const DAYS_MAP={mon:"Monday",tue:"Tuesday",wed:"Wednesday",thu:"Thursday",fri:"Friday",sat:"Saturday",sun:"Sunday"};

  useEffect(()=>{
    if(!hasKey||!hasSecret){setLoading(false);return;}
    setLoading(true);
    Promise.all([loadRecipes(),loadSchedule()]).then(([r,s])=>{
      setRecipes(r||[]);
      setSchedule(s||{});
      const localR=getLocalRecipes();
      if(localR.length>0&&(r||[]).length===0) setMigrationPending(true);
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[hasKey,hasSecret]);

  const showSave=status=>{
    setSaveStatus(status);
    if(status==="saved"||status==="error") setTimeout(()=>setSaveStatus(null),2500);
  };

  const handleUpdateSchedule=async s=>{
    setSchedule(s); showSave("saving");
    try{await saveSchedule(s);showSave("saved");}catch{showSave("error");}
  };

  const handlePlannerPick=recipeId=>{
    if(plannerPickDay){
      const next={...schedule,[plannerPickDay]:recipeId};
      handleUpdateSchedule(next);
      setPlannerPickDay(null);
      setScreen("planner");
    }
  };

  const handleMigrate=async()=>{
    const localR=getLocalRecipes(); const localS=getLocalSchedule();
    showSave("saving");
    try{
      await saveRecipes(localR); await saveSchedule(localS);
      setRecipes(localR); setSchedule(localS);
      clearLocalData(); setMigrationPending(false); showSave("saved");
    }catch{showSave("error");}
  };

  useEffect(()=>{
    const onBack=e=>{
      e.preventDefault();
      if(screen==="cook"){setScreen("detail");return;}
      if(screen==="detail"){
        if(plannerPickDay){setScreen("recipelist");return;}
        setScreen(active?.fromPlanner?"planner":"recipelist");return;
      }
      if(screen==="recipelist"){setScreen("catalog");return;}
      if(screen==="catalog"){
        if(plannerPickDay){setPlannerPickDay(null);setScreen("planner");return;}
        setScreen("home");return;
      }
      if(screen==="planner"){setScreen("home");return;}
      if(screen==="scan"){setScreen(activeCategory?"recipelist":"catalog");return;}
      if(showSettings){setShowSettings(false);return;}
      if(exitPrompt){window.history.back();return;}
      setExitPrompt(true);setTimeout(()=>setExitPrompt(false),2000);
    };
    window.history.pushState(null,"",window.location.href);
    window.addEventListener("popstate",onBack);
    return()=>window.removeEventListener("popstate",onBack);
  },[screen,showSettings,exitPrompt,activeCategory,active,plannerPickDay]);

  useEffect(()=>{window.history.pushState(null,"",window.location.href);},[screen]);

  const [dupCheck,setDupCheck]=useState(null); // {newRecipe, existing}

  const commitSave=async r=>{
    const next=[r,...recipes]; setRecipes(next); showSave("saving");
    try{await saveRecipes(next);showSave("saved");}catch{showSave("error");}
    setDupCheck(null);
    setScreen(activeCategory?"recipelist":"catalog");
  };
  const commitReplace=async(newR,oldId)=>{
    const next=[newR,...recipes.filter(r=>r.id!==oldId)]; setRecipes(next); showSave("saving");
    try{await saveRecipes(next);showSave("saved");}catch{showSave("error");}
    setDupCheck(null);
    setScreen(activeCategory?"recipelist":"catalog");
  };

  const handleSaved=async r=>{
    const dups=findDuplicates(r.title, recipes);
    if(dups.length>0){
      setDupCheck({newRecipe:r, existing:dups[0]});
      setScreen(activeCategory?"recipelist":"catalog"); // go back behind the modal
      return;
    }
    await commitSave(r);
  };
  const handleDelete=async id=>{
    const next=recipes.filter(r=>r.id!==id); setRecipes(next); showSave("saving");
    try{await saveRecipes(next);showSave("saved");}catch{showSave("error");}
  };
  const handleUpdatePhoto=async(id,img)=>{
    const next=recipes.map(r=>r.id===id?{...r,frontImage:img}:r); setRecipes(next);
    if(active?.recipe?.id===id)setActive(p=>({...p,recipe:{...p.recipe,frontImage:img}}));
    showSave("saving");
    try{await saveRecipes(next);showSave("saved");}catch{showSave("error");}
  };
  const handleUpdateCategory=async(id,catId)=>{
    const next=recipes.map(r=>r.id===id?{...r,category:catId}:r); setRecipes(next);
    if(active?.recipe?.id===id)setActive(p=>({...p,recipe:{...p.recipe,category:catId}}));
    showSave("saving");
    try{await saveRecipes(next);showSave("saved");}catch{showSave("error");}
  };
  const goToRecipe=(r,fromPlanner=false)=>{setActive({recipe:r,guestCount:r.servings,scaledIngredients:scaleIngredients(r,r.servings),fromPlanner});setScreen("detail");};

  const pickBanner=plannerPickDay?(
    <div style={{background:C.plum,padding:"10px 20px",display:"flex",alignItems:"center",gap:10}}>
      <span style={{fontSize:14,color:"rgba(255,255,255,0.8)"}}>Picking meal for</span>
      <span style={{fontSize:14,fontWeight:700,color:"#fff"}}>{DAYS_MAP[plannerPickDay]}</span>
      <button onClick={()=>{setPlannerPickDay(null);setScreen("planner");}} style={{marginLeft:"auto",background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",borderRadius:6,padding:"4px 12px",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
    </div>
  ):null;

  const saveToast=saveStatus?(
    <div style={{position:"fixed",bottom:32,right:24,background:saveStatus==="error"?"#b03020":saveStatus==="saving"?"#555":C.sage,color:"#fff",padding:"10px 18px",borderRadius:50,fontSize:13,fontWeight:600,zIndex:999,boxShadow:"0 2px 12px rgba(0,0,0,0.2)"}}>
      {saveStatus==="saving"?"Saving...":saveStatus==="saved"?"Saved":"Save failed"}
    </div>
  ):null;

  if(!hasKey||showSettings) return <ApiKeyScreen onSaved={()=>{setHasKey(true);setShowSettings(false);}}/>;
  if(!hasSecret) return <SecretScreen onSaved={s=>{setDinnSecret(s);setHasSecret(true);}}/>;

  if(loading) return (
    <div style={{...base,minHeight:"100vh",background:C.paper,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:32}}>&#127860;</div>
      <div style={{fontSize:16,color:C.muted}}>Loading your recipes...</div>
      <div style={{display:"flex",gap:8}}>{[0,1,2].map(i=><div key={i} style={{width:10,height:10,borderRadius:"50%",background:C.sage,animation:`pulse 1.4s ${i*0.2}s infinite`}}/>)}</div>
    </div>
  );

  if(screen==="scan") return <ScanScreen onBack={()=>setScreen(activeCategory?"recipelist":"catalog")} onSaved={handleSaved}/>;
  if(screen==="detail"&&active?.recipe) return (
    <DetailScreen recipe={active.recipe}
      onBack={()=>{if(plannerPickDay){setScreen("recipelist");}else{setScreen(active?.fromPlanner?"planner":"recipelist");}}}
      onUpdatePhoto={handleUpdatePhoto} onUpdateCategory={handleUpdateCategory}
      plannerPickDay={plannerPickDay}
      plannerDayLabel={plannerPickDay?DAYS_MAP[plannerPickDay]:null}
      onAddToPlanner={()=>handlePlannerPick(active.recipe.id)}
      onCook={(r,g,s)=>{setActive(p=>({...p,recipe:r,guestCount:g,scaledIngredients:s}));setScreen("cook");}}/>
  );
  if(screen==="cook"&&active?.recipe) return (
    <CookScreen recipe={active.recipe} guestCount={active.guestCount} scaledIngredients={active.scaledIngredients} onBack={()=>setScreen("detail")}/>
  );
  if(screen==="recipelist"&&activeCategory) return (
    <>{pickBanner}
      <RecipeListScreen recipes={recipes} categoryId={activeCategory}
        onBack={()=>setScreen("catalog")}
        onSelect={r=>goToRecipe(r,false)}
        onDelete={handleDelete} onAdd={()=>setScreen("scan")}/>
    </>
  );
  if(screen==="catalog") return (
    <>{pickBanner}
      <CategoryScreen recipes={recipes}
        onBack={()=>{if(plannerPickDay){setPlannerPickDay(null);setScreen("planner");}else{setScreen("home");}}}
        onSelectCategory={id=>{setActiveCategory(id);setScreen("recipelist");}}
        onAdd={()=>setScreen("scan")}/>
    </>
  );
  if(screen==="planner") return (
    <PlannerScreen recipes={recipes} schedule={schedule}
      onUpdateSchedule={handleUpdateSchedule}
      onBack={()=>setScreen("home")}
      onViewRecipe={r=>goToRecipe(r,true)}
      onPickDay={day=>{setPlannerPickDay(day);setActiveCategory(null);setScreen("catalog");}}/>
  );

  return (
    <>
      <HomeScreen recipes={recipes} schedule={schedule}
        onCatalog={()=>setScreen("catalog")}
        onPlanner={()=>setScreen("planner")}
        onAdd={()=>{setActiveCategory(null);setScreen("scan");}}
        onSettings={()=>setShowSettings(true)}/>
      {migrationPending&&(
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:C.card,borderRadius:16,padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,0.2)",zIndex:999,maxWidth:400,width:"calc(100% - 48px)"}}>
          <div style={{fontSize:15,fontWeight:700,color:C.ink,marginBottom:6}}>Local recipes found</div>
          <div style={{fontSize:13,color:C.muted,marginBottom:16}}>You have {getLocalRecipes().length} recipes stored locally on this device. Upload them to the cloud so all devices can access them.</div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={handleMigrate} style={{...btnP,flex:1,padding:"10px",fontSize:14}}>Upload to Cloud</button>
            <button onClick={()=>setMigrationPending(false)} style={{...btnG,padding:"10px 16px",fontSize:14}}>Dismiss</button>
          </div>
        </div>
      )}
      {exitPrompt&&<div style={{position:"fixed",bottom:40,left:"50%",transform:"translateX(-50%)",background:"rgba(0,0,0,0.8)",color:"#fff",padding:"12px 24px",borderRadius:50,fontSize:15,fontWeight:600,zIndex:999,whiteSpace:"nowrap"}}>Tap back again to exit</div>}
      {saveToast}
      {dupCheck&&<DuplicateModal
        newRecipe={dupCheck.newRecipe}
        existing={dupCheck.existing}
        onKeepExisting={()=>{setDupCheck(null);}}
        onSaveNew={()=>commitSave(dupCheck.newRecipe)}
        onReplace={()=>commitReplace(dupCheck.newRecipe,dupCheck.existing.id)}
      />}
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
